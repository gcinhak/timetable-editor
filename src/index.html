<!-- timetable-web-cf SPA -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>시간표 변경</title>
<script src="https://accounts.google.com/gsi/client" onload="gsiLoaded()" async defer></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    background: #f5f6f8;
    color: #222;
    font-size: 13px;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }

  /* 로그인 */
  #loginScreen {
    display: none;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 20px;
  }
  #loginScreen h1 { font-size: 20px; margin: 0; text-align: center; }
  #loginMsg { color: #b3261e; font-size: 13px; min-height: 18px; text-align: center; }
  #sheetsGrant { display: none; text-align: center; }
  #sheetsGrant p { margin: 0 0 10px; font-size: 13px; color: #444; }
  #btnSheetsGrant {
    font-size: 13px; height: 36px; padding: 0 18px; border: 1px solid #2f5fa8;
    background: #2f5fa8; color: #fff; border-radius: 10px; cursor: pointer; font-weight: 600;
  }
  #btnSheetsGrant:disabled { background: #9db3d6; border-color: #9db3d6; cursor: default; }

  /* 시트 접근 권한 재허용 배너 — 작업 화면을 유지한 채 복구시킨다 */
  #reauthBanner {
    display: none; position: fixed; left: 0; right: 0; bottom: 0; z-index: 80;
    align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap;
    padding: 12px 16px; background: #fff4e5; border-top: 1px solid #f0b76b;
    color: #7c4a00; font-size: 13px;
  }
  #reauthBanner button {
    font-size: 13px; height: 32px; padding: 0 14px; border: 1px solid #b45309;
    background: #b45309; color: #fff; border-radius: 8px; cursor: pointer; font-weight: 600;
  }
  #reauthBanner button:disabled { background: #d9b48a; border-color: #d9b48a; cursor: default; }

  /* 툴바 */
  #toolbar {
    position: sticky;
    top: 0;
    z-index: 30;
    background: #fff;
    border-bottom: 1px solid #ddd;
    padding: 8px 14px;
    display: none;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
  }
  #devBanner { display:none; position:fixed; top:0; left:0; right:0; height:30px; line-height:30px; text-align:center; font-weight:700; font-size:12px; background:#fde68a; color:#7c4a00; z-index:60; }
  body.dev-mode { padding-top:30px; }
  body.dev-mode #toolbar { top:30px; }
  #toolbar h1 { margin: 0; font-size: 16px; font-weight: 700; white-space: nowrap; }
  #toolbar button {
    font-size: 12px; height: 32px; padding: 0 13px; border: 1px solid #d9dce1;
    background: #fff; border-radius: 10px; cursor: pointer; color: #1f2937;
    font-weight: 500; transition: background .12s, border-color .12s;
  }
  #toolbar button:hover { background: #f4f5f7; border-color: #c3c8cf; }
  #toolbar button:disabled { cursor: default; background: #fafafa; border-color: #e8eaed; }
  /* 아이콘 버튼(정사각 라운드) — 텍스트 글리프라 CSS 색상 적용 가능 */
  #toolbar button.tb-icon { width: 32px; padding: 0; font-size: 15px; font-weight: 700; line-height: 1; }
  #btnRefresh { color: #2b6cb0; }
  #btnUndo { color: #c05621; }
  #btnUndo:disabled { color: #b9b9b9; }
  /* 그룹 구분선 */
  .tb-sep { width: 1px; height: 24px; background: #e6e8eb; flex: 0 0 auto; }
  /* 모드 토글 버튼(필 모양, 활성 시 검정 필 + 흰 글자) */
  #toolbar button.tb-mode { border-radius: 999px; }
  #toolbar button.tb-mode.active { background: #17181c; border-color: #17181c; color: #fff; }
  #toolbar button.tb-mode.active:hover { background: #17181c; border-color: #17181c; }
  #toolbar input[type=text] { font-size: 12px; height: 32px; padding: 0 11px; border: 1px solid #d9dce1; border-radius: 10px; width: 210px; }
  #toolbar input[type=text]:disabled { background: #eee; color: #999; }
  #toolbar select { font-size: 12px; height: 32px; padding: 0 8px; border: 1px solid #d9dce1; border-radius: 10px; background: #fff; color: #1f2937; }
  #toolbarNote { font-size: 12px; color: #b3261e; font-weight: 600; }
  #groupHint { font-size: 12px; color: #2f5fa8; font-weight: 600; }
  #sheetNote { font-size: 11px; color: #888; }
  #userInfo { margin-left: auto; font-size: 11px; color: #999; }
  body.dev-mode #btnLogout { display: none; }   /* 개발 모드에는 로그인 개념이 없다 */

  /* 그리드 */
  /* 그리드가 자체 스크롤 컨테이너: 헤더행 sticky 고정 + 가로/세로 스크롤바 항상 표시 */
  #gridWrap { display: none; padding: 10px 14px 120px; overflow: scroll; flex: 1 1 auto; min-height: 0; }
  table.grid { border-collapse: collapse; background: #fff; table-layout: fixed; }
  table.grid th, table.grid td {
    border: 1px solid #dfe3e8; text-align: center;
    font-size: 12px; width: 44px; height: 30px;
    box-sizing: border-box; vertical-align: middle;
  }
  table.grid thead th {
    position: sticky; top: 0; z-index: 20; background: #f0f3f7; font-weight: 700; padding: 3px 4px;
  }
  table.grid th.name {
    position: sticky; left: 0; z-index: 15; background: #f7f9fb;
    text-align: left; font-weight: 600; width: 84px; min-width: 84px; max-width: 84px;
    padding: 3px 6px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  table.grid th.name.dept-head { background: #d9e6f8; }
  table.grid td .cb {
    display: flex; align-items: center; justify-content: center;
    height: 30px; padding: 0 2px; overflow: hidden; font-size: 8px;
    word-break: break-word; overflow-wrap: anywhere; line-height: 1.12;
    transform: scaleX(0.85); transform-origin: center; letter-spacing: -0.2px;
  }
  table.grid thead th.corner { left: 0; z-index: 25; }
  table.grid td.filled { cursor: pointer; background: #fbfcfd; }
  table.grid td.filled:hover { outline: 2px solid #7aa7e0; outline-offset: -2px; }
  table.grid tr.ra-row { display: none; }
  table.grid tr.ra-row td.filled { cursor: default; }
  table.grid tr.ra-row td.filled:hover { outline: none; }
  body.show-ra table.grid tr.ra-row { display: table-row; }
  table.grid thead th.slot-h { cursor: default; }
  table.grid th.day-start, table.grid td.day-start { border-left: 3px double #6b7684; }
  table.grid tr.dept-start th, table.grid tr.dept-start td { border-top: 3px double #6b7684; }
  table.grid thead th.blk-all { background: #f3c6c6; color: #8a2b2b; }
  table.grid thead th.blk-part { background: #f5e6a8; color: #7a5c00; }
  table.grid td.blk-all { background: #fae3e3; }
  table.grid td.blk-part { background: #fdf5d7; }
  /* 같은 요일에 동일 과목 2회 이상 배치된 슬롯 (보라 틴트) */
  table.grid td.dup-day { background: #ecdff7; }

  /* 하이라이트 4색 */
  td.hl-green { background: #b6d7a8 !important; cursor: pointer; }
  td.hl-yellow { background: #ffe599 !important; cursor: pointer; }
  td.hl-blue { background: #a4c2f4 !important; }
  td.hl-orange { background: #f9cb9c !important; }
  td.grp-outline { outline: 3px solid #2f5fa8; outline-offset: -3px; }

  /* 교사 불가 시간 */
  table.grid td.unavail { background: #e3e5e8; position: relative; }
  table.grid td.unavail::after { content: '✕'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #9aa0a6; font-size: 12px; pointer-events: none; }
  table.grid td.unavail-warn { background: #eef0f2; position: relative; }
  table.grid td.unavail-warn::after { content: '✕'; position: absolute; top: 0; right: 1px; font-size: 8px; line-height: 1; color: #9aa0a6; pointer-events: none; }
  table.grid td.pinned { position: relative; }
  /* 고정 수업 표시: 정면에서 본 압정 머리 느낌의 빨간 점 (좌상단) */
  table.grid td.pinned::before {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 4px; height: 4px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f28b82 0 25%, #d93025 60%, #a50e0e 100%);
    box-shadow: 0 0 0 1px rgba(165,14,14,.35);
    pointer-events: none;
  }

  /* 하단 패널 */
  #panel {
    display: none; position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
    background: #fff; border-top: 2px solid #2f5fa8; padding: 12px 16px;
    box-shadow: 0 -2px 10px rgba(0,0,0,.08);
  }
  #panelBar { display: flex; align-items: center; gap: 10px; }
  #panel h3 { margin: 0; font-size: 14px; cursor: pointer; user-select: none; }
  #panelToggle {
    border: 1px solid #bbb; background: #fff; border-radius: 4px; cursor: pointer;
    font-size: 14px; line-height: 1; padding: 3px 9px; color: #2f5fa8;
  }
  #panelToggle:hover { background: #f0f3f7; }
  #panelBody {
    overflow: hidden; max-height: 50vh; opacity: 1; margin-top: 8px;
    transition: max-height .25s ease, opacity .2s ease, margin-top .25s ease;
  }
  #panel.collapsed #panelBody { max-height: 0; opacity: 0; margin-top: 0; }
  #panelSteps { margin: 0 0 10px; padding-left: 18px; font-size: 13px; }
  #panelSteps li { margin: 2px 0; }
  #planPaths { margin: 0 0 8px; font-size: 13px; }
  #planPaths .paths-head { margin: 0 0 4px; font-weight: 600; }
  #planPaths label { display: block; margin: 2px 0; cursor: pointer; }
  #planPaths input { margin-right: 6px; }
  #panel .btns { display: flex; gap: 10px; margin-left: auto; }
  #panel .btns button { font-size: 13px; padding: 7px 18px; border-radius: 5px; cursor: pointer; border: 1px solid #bbb; }
  #btnConfirm { background: #2f5fa8; color: #fff; border-color: #2f5fa8; }

  #loading {
    position: fixed; inset: 0; background: rgba(255,255,255,.75);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; z-index: 100; font-size: 14px; color: #555;
  }
  .spinner {
    width: 34px; height: 34px; border: 4px solid #d5dbe4; border-top-color: #2f5fa8;
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 공용 백드롭 */
  #backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 45; }
  #backdrop.on { display: block; }

  /* 설정 모달(중앙) */
  #settings {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 720px; max-width: 92vw;
    /* 높이 고정 — 탭마다 내용 길이가 달라도 창(=탭 바) 위치가 흔들리지 않는다.
       길이 차이는 #settingsBody 스크롤이 흡수한다. */
    height: min(85vh, 760px);
    background: #fff; border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,.25); z-index: 55;
    display: none; flex-direction: column;
  }
  #settings.open { display: flex; }
  #settings > header { padding: 12px 16px; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 10px; }
  #settings > header h2 { margin: 0; font-size: 15px; flex: 1; }
  #settings .x-close { border: none; background: none; font-size: 18px; line-height: 1; color: #888; cursor: pointer; padding: 2px 6px; }
  #settings .x-close:hover { color: #333; }
  #settings .tabbar { display: flex; gap: 2px; padding: 0 10px; border-bottom: 1px solid #ddd; overflow-x: auto; }
  #settings .tabbar button { border: none; background: none; padding: 9px 8px; font-size: 13px; color: #555; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; }
  #settings .tabbar button:hover { color: #2f5fa8; }
  #settings .tabbar button.active { color: #2f5fa8; font-weight: 700; border-bottom-color: #2f5fa8; }
  #settingsBody { flex: 1; min-height: 0; overflow: auto; padding: 12px 16px; }
  #settings > footer { padding: 10px 16px; border-top: 1px solid #ddd; display: flex; gap: 10px; justify-content: flex-end; }
  #settings .sec { margin-bottom: 18px; }
  #settings .sec h3 { margin: 0 0 8px; font-size: 13px; color: #2f5fa8; border-bottom: 1px solid #eee; padding-bottom: 4px; }
  #settings .sec h3 .h-help { font-weight: 400; margin-left: 8px; font-size: 12px; }
  #toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(8px);
    background: #2f5fa8; color: #fff; font-size: 13px; padding: 8px 18px; border-radius: 20px;
    box-shadow: 0 2px 10px rgba(0,0,0,.25); opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s; z-index: 120;
  }
  #toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
  #settings .row { display: flex; gap: 6px; align-items: center; margin: 4px 0; flex-wrap: wrap; }
  #settings .muted { color: #999; font-size: 12px; }
  #settings button { font-size: 12px; padding: 4px 10px; border: 1px solid #bbb; background: #fff; border-radius: 4px; cursor: pointer; }
  #settings button.primary { background: #2f5fa8; color: #fff; border-color: #2f5fa8; }
  #settings select[multiple] { min-width: 170px; }
  #settings input[type=text] { font-size: 12px; padding: 3px 6px; border: 1px solid #bbb; border-radius: 4px; }
  .cl-toolbar { position: sticky; top: 0; background: #fff; z-index: 1; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; padding: 6px 0; border-bottom: 1px solid #eee; margin-bottom: 6px; }
  .cl-toolbar input[type=text] { flex: 1; min-width: 140px; }
  .cl-list {}
  .cl-card { border: 1px solid #eee; border-radius: 4px; padding: 6px; margin: 6px 0; }
  .cl-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 2px; flex: none; }
  .cl-dot-red { background: #d33; }
  .cl-dot-gray { background: #bbb; }
  .cl-dot-green { background: #2e9d4f; }
  .cl-subj { font-weight: 600; }
  .cl-note { font-size: 11px; color: #999; margin: 2px 0 2px 14px; }
  .cl-picker-row { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; margin: 3px 0; }
  .cl-picker-row .muted { min-width: 64px; }
  .cl-picker button[disabled] { opacity: .4; cursor: default; }
  .blk-row, .grp-row, .team-row, .pin-card { border: 1px solid #eee; border-radius: 4px; padding: 8px; margin: 6px 0; }
  .blk-row .grp { margin: 6px 0; }
  .blk-row .grp b { font-size: 11px; color: #555; }
  .blk-row label { display: inline-block; margin: 2px 8px 2px 0; font-size: 11px; }
  .blk-row select { font-size: 12px; padding: 3px 6px; border: 1px solid #bbb; border-radius: 4px; }
  .blk-badge-all, .blk-badge-part { font-size: 10px; border-radius: 8px; padding: 1px 7px; font-weight: 600; white-space: nowrap; }
  .blk-badge-all { background: #f3c6c6; color: #8a2b2b; }
  .blk-badge-part { background: #f5e6a8; color: #7a5c00; }
  /* 학년별 시간표 통합 매트릭스 */
  table.gh-matrix { border-collapse: collapse; margin: 10px 0; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  table.gh-matrix th, table.gh-matrix td { border: 1px solid #e3e6ea; text-align: center; font-size: 12px; }
  table.gh-matrix th { background: #f0f3f7; color: #44506a; font-weight: 700; padding: 6px 12px; cursor: default; user-select: none; }
  table.gh-matrix th.gh-corner { cursor: default; background: #fff; }
  table.gh-matrix th.gh-bulk { cursor: pointer; }
  table.gh-matrix th.gh-bulk:hover { background: #dfe8f5; }
  .gh-grades { margin: 6px 0; }
  .gh-grades button { font-size: 12px; padding: 3px 10px; margin-right: 4px; border: 1px solid #bbb; border-radius: 4px; background: #fff; cursor: pointer; }
  #settings .gh-grades button.active { background: #2f5fa8; color: #fff; border-color: #2f5fa8; font-weight: 700; }
  .gh-grades button.active { background: #2b6cb0; color: #fff; border-color: #2b6cb0; }
  /* 학년별 시간표 셀 */
  table.gh-matrix td.gf-cell {
    position: relative; cursor: default; width: 104px; max-width: 104px; height: 40px;
    vertical-align: top;
    font-size: 11px; white-space: normal; word-break: break-all; overflow-wrap: anywhere;
    line-height: 1.2; padding: 3px 4px;
  }
  /* 상태 줄(공강/금지) — 칸의 1순위 정보 */
  table.gh-matrix td.gf-cell .gf-st { min-height: 13px; }
  /* 과목 줄 — 2순위. 상태 줄과 섞이지 않게 점선으로 구분하고 작고 옅게 */
  table.gh-matrix td.gf-cell .gf-subj {
    margin-top: 3px; padding-top: 2px; border-top: 1px dotted rgba(0,0,0,.18);
    font-size: 9.5px; line-height: 1.25; font-weight: 400; color: #5c6474;
    letter-spacing: -0.2px;
  }
  /* 상태 줄이 없는 칸(수업으로 꽉 찬 칸)은 구분선·여백 없이 과목만 */
  table.gh-matrix td.gf-cell .gf-subj-only { margin-top: 0; padding-top: 0; border-top: none; }
  table.gh-matrix td.gf-cell .gf-subj span { display: block; overflow-wrap: anywhere; }
  table.gh-matrix td.gf-cell .gf-subj span.gf-more { color: #98a0b0; font-style: italic; }
  /* 배경이 짙은 칸에서도 과목이 읽히게 대비 확보 */
  table.gh-matrix td.gf-blocked .gf-subj { color: #3d4a63; }
  /* 금지 슬롯에 수업이 편성돼 있으면 그 자체가 이상 신호 — 사선 무늬 위에서도 또렷하게(마지막에 선언해 우선) */
  table.gh-matrix td.gf-nogo .gf-subj {
    color: #6d1f1f; font-weight: 600; border-top-color: rgba(138,43,43,.45);
    text-shadow: 0 0 2px #fff, 0 0 2px #fff;
  }
  table.gh-matrix td.gf-all  { background: #d9ead3; color: #274e13; font-weight: 600; }
  table.gh-matrix td.gf-some { background: #eaf5e0; color: #3c6b1e; font-weight: 600; }
  table.gh-matrix td.gf-part { background: #f5e6a8; color: #7a5c00; font-weight: 600; }
  table.gh-matrix td.gf-none { background: #fff; }
  table.gh-matrix td.gf-blocked { background: #dfe5ee; color: #3d4a63; font-weight: 600; }
  table.gh-matrix td.gf-ra { background: #e4e4e4; color: #666; }
  /* 그리드 삽입형 학년별 공강 행 (학년별 시간표 탭과 동일 색상) */
  table.grid tr.gf-row th.name { background: #eef2f8; color: #44506a; }
  table.grid tr.gf-row td { cursor: default; height: auto; }
  /* 공강 행 셀 내용: 여러 감독명도 잘리지 않게 줄바꿈·자동 높이 (.cb와 달리 fitCells 미적용) */
  table.grid tr.gf-row td .gfb {
    display: flex; align-items: center; justify-content: center;
    min-height: 30px; padding: 1px 2px; font-size: 7.5px;
    word-break: break-all; overflow-wrap: anywhere; line-height: 1.15;
    transform: scaleX(0.85); transform-origin: center; letter-spacing: -0.2px;
  }
  table.grid td.gfr-all { background: #d9ead3; color: #274e13; font-weight: 600; }
  table.grid td.gfr-some { background: #eaf5e0; color: #3c6b1e; font-weight: 600; }
  table.grid td.gfr-partial { background: #f5e6a8; color: #7a5c00; font-weight: 600; }
  table.grid td.gfr-blocked { background: #dfe5ee; color: #3d4a63; font-weight: 600; }
  table.grid td.gfr-none { background: #fff; }
  table.grid td.gfr-ra { background: #e4e4e4; color: #666; }
  /* RA 감독 배정: 클릭 가능한 공강 셀 */
  table.grid tr.gf-row td.gfr-all, table.grid tr.gf-row td.gfr-some, table.grid tr.gf-row td.gfr-partial { cursor: pointer; }
  /* 금지 슬롯(학년 전체·라벨 없음) — 색이 아니라 사선 무늬로 구분(색약 고려) */
  table.gh-matrix td.gf-nogo {
    background-color: #f3c6c6; color: #8a2b2b; font-weight: 700;
    background-image: repeating-linear-gradient(45deg, rgba(138,43,43,.26) 0 3px, rgba(0,0,0,0) 3px 7px);
  }

<script>
/* =========================================================
   인증 (Google Identity Services)
   ========================================================= */
var GOOGLE_CLIENT_ID = '__GOOGLE_CLIENT_ID__';
var DEV_MODE = ('__DEV_MODE__' === '1');
var TOKEN_KEY = 'timetable_id_token';
var RECENT_KEY = 'timetable_recent_sheet';

function getToken() { try { return sessionStorage.getItem(TOKEN_KEY) || ''; } catch (_) { return ''; } }
function setToken(t) { try { if (t) sessionStorage.setItem(TOKEN_KEY, t); else sessionStorage.removeItem(TOKEN_KEY); } catch (_) {} }

function show(id, on, disp) { document.getElementById(id).style.display = on ? (disp || 'block') : 'none'; }

/* 하단 패널 접기/펼치기: 'collapsed'는 display(숨김)와 별개 상태 */
function setPanelCollapsed(on) {
  document.getElementById('panel').classList.toggle('collapsed', !!on);
  var t = document.getElementById('panelToggle');
  t.textContent = on ? '⌃' : '⌄';
  t.title = on ? '펼치기' : '접기';
}
function togglePanelCollapse() {
  setPanelCollapsed(!document.getElementById('panel').classList.contains('collapsed'));
}

/* 로그인 화면. keepIdToken=true 면 ID 토큰은 유지한다(시트 권한만 문제인 경우). */
function showLogin(msg, keepIdToken) {
  if (!keepIdToken) setToken('');
  show('loading', false);
  show('toolbar', false);
  show('gridWrap', false);
  show('panel', false);
  hideReauthBanner();
  if (!keepIdToken) document.getElementById('sheetsGrant').style.display = 'none';
  show('loginScreen', true, 'flex');
  document.getElementById('loginMsg').textContent = msg || '';
}

/* ---------- 시트 접근용 OAuth access token ----------
 * ID 토큰(신원)과 access 토큰(데이터 접근)을 분리한다.
 * access token 은 메모리에만 두고(약 1시간 만료) 사용한다.
 * GIS 의 requestAccessToken 은 prompt:'' 여도 항상 팝업을 열기 때문에
 * 반드시 "사용자 클릭 제스처" 안에서만 호출한다(자동 재발급 없음).
 */
var SHEETS_SCOPE = 'https://www.googleapis.com/auth/spreadsheets';
var sheetsToken = '';
var tokenClient = null;

function gsiLoaded() {
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: function (resp) {
      // 여기서 access token 을 자동 요청하지 않는다(제스처 소멸 → 팝업 차단).
      // enterApp 이 1회 시도해 보고, 실패하면 복구 가능한 [권한 허용] 버튼을 남긴다.
      if (resp && resp.credential) { setToken(resp.credential); enterApp(); }
    }
  });
  google.accounts.id.renderButton(document.getElementById('gsiButton'),
    { theme: 'outline', size: 'large', text: 'signin_with' });
  if (!DEV_MODE && google.accounts.oauth2) {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: SHEETS_SCOPE,
      callback: function () {}   // requestSheetsToken 에서 매번 교체
    });
  }
}

/* GIS 오류(err.type / resp.error) → 사용자 안내 문구 */
function reauthFailMsg(err) {
  var m = String((err && err.message) || err || '');
  if (/popup_failed_to_open/.test(m)) return '브라우저가 팝업을 차단했습니다. 팝업을 허용한 뒤 다시 시도해 주세요.';
  if (/popup_closed/.test(m)) return '권한 창이 닫혔습니다. 다시 시도해 주세요.';
  if (/access_denied/.test(m)) return '권한이 거부되었습니다. 계속하려면 권한을 허용해 주세요.';
  if (/sheets_token_timeout/.test(m)) return '권한 창의 응답이 없습니다. 다시 시도해 주세요.';
  if (/token_client_unavailable/.test(m)) return '구글 인증 스크립트를 불러오지 못했습니다. 새로고침해 주세요.';
  return '시트 접근 권한을 받지 못했습니다. 다시 시도해 주세요.';
}

/* ---------- 재허용 UI (DOM) ----------
 * 토큰 계층(@token-layer)은 DOM 을 직접 만지지 않고 이 두 함수만 호출한다.
 * onGrant(promptMode) 는 실제 click 핸들러 안에서 호출되어야 팝업이 열린다.
 */
function showReauthBanner(kind, onGrant) {
  show('loading', false);
  var el = document.getElementById('reauthBanner');
  var msgEl = document.getElementById('reauthMsg');
  var btn = document.getElementById('reauthBtn');
  msgEl.textContent = (kind === 'consent')
    ? '시트 접근 권한(스코프)이 부족합니다. 권한을 다시 허용해 주세요.'
    : '시트 접근 권한이 만료되었습니다. 작업 내용은 그대로 있습니다 — 다시 허용해 주세요.';
  btn.textContent = (kind === 'consent') ? '권한 허용' : '다시 허용';
  btn.disabled = false;
  btn.onclick = function () {
    btn.disabled = true;
    msgEl.textContent = '권한 창을 여는 중입니다…';
    onGrant(kind === 'consent' ? 'consent' : '').catch(function (e) {
      btn.disabled = false;
      msgEl.textContent = reauthFailMsg(e);
    });
  };
  el.style.display = 'flex';
}
function hideReauthBanner() {
  var el = document.getElementById('reauthBanner');
  if (el) el.style.display = 'none';
}

/* @token-layer-start
 * 테스트가 이 구간을 통째로 추출해 가짜 tokenClient/fetch 만 주입한다.
 * 구간 안에서는 DOM 을 직접 만지지 않는다(showReauthBanner/hideReauthBanner 위임). */
var SHEETS_TOKEN_TIMEOUT_MS = 60000;  // GIS 가 콜백을 영영 안 부르는 경우 탈출
var tokenPending = null;              // 진행 중인 토큰 요청(중복 팝업 방지)
var accessPending = null;             // 진행 중인 "재허용" 대기(중복 배너 방지)
var sheetsTokenGen = 0;               // 토큰 세대 — 늦게 도착한 401 판별용

/* GIS 토큰 요청. 반드시 클릭 제스처 안에서 호출할 것.
 * 진행 중 요청은 공유하고, 콜백이 오지 않으면 타임아웃으로 반드시 settle 한다. */
function requestSheetsToken(promptMode) {
  if (DEV_MODE) return Promise.resolve('');
  if (tokenPending) return tokenPending;
  var settled = false;
  var timer = null;
  var p = new Promise(function (resolve, reject) {
    var done = function (fn, v) {
      if (settled) return;
      settled = true;
      if (timer) { clearTimeout(timer); timer = null; }
      tokenPending = null;   // 즉시 해제 — 다음 시도가 이미 끝난 promise 를 재사용하지 않게
      fn(v);
    };
    if (!tokenClient) { done(reject, new Error('token_client_unavailable')); return; }
    tokenClient.callback = function (resp) {
      if (resp && resp.access_token) {
        sheetsToken = resp.access_token;
        sheetsTokenGen++;
        done(resolve, sheetsToken);
      } else {
        done(reject, new Error((resp && resp.error) || 'sheets_token_failed'));
      }
    };
    tokenClient.error_callback = function (err) {
      done(reject, new Error((err && err.type) || 'sheets_token_failed'));
    };
    timer = setTimeout(function () { done(reject, new Error('sheets_token_timeout')); }, SHEETS_TOKEN_TIMEOUT_MS);
    try { tokenClient.requestAccessToken({ prompt: promptMode || '' }); }
    catch (e) { done(reject, e); }
  });
  p.catch(function () {});          // unhandled rejection 방지
  if (!settled) tokenPending = p;   // 동기 settle 이면 대입하지 않는다
  return p;
}

/* 재허용 배너를 띄우고, 사용자가 버튼을 눌러 토큰을 받을 때까지 기다린다.
 * 실패해도 reject 하지 않고 배너를 유지한다 → 화면/작업 상태를 잃지 않는다. */
function awaitSheetsAccess(kind) {
  if (accessPending) return accessPending;
  accessPending = new Promise(function (resolve) {
    showReauthBanner(kind, function (promptMode) {
      return requestSheetsToken(promptMode).then(function (t) {
        accessPending = null;
        hideReauthBanner();
        resolve(t);
        return t;
      });
    });
  });
  return accessPending;
}

/* =========================================================
   API
   ========================================================= */
/* 1회 요청. 응답 본문을 항상 파싱해 { status, ok, data } 로 반환한다. */
function apiFetch(path, opts) {
  var o = Object.assign({}, opts || {});
  var headers = Object.assign({ 'Authorization': 'Bearer ' + getToken() }, (opts && opts.headers) || {});
  if (!DEV_MODE) headers['X-Sheets-Token'] = sheetsToken;
  o.headers = headers;
  return fetch(path, o).then(function (res) {
    return res.json().catch(function () { return null; }).then(function (data) {
      return { status: res.status, ok: res.ok, data: data };
    });
  });
}

/* 시트 접근 권한을 다시 받아야 하는 응답인지: '' | 'expired' | 'consent' */
function sheetsAccessKind(r) {
  var code = r && r.data && r.data.error;
  if (r && r.status === 401 && (code === 'sheets_token_expired' || code === 'missing_sheets_token')) return 'expired';
  if (r && r.status === 403 && code === 'insufficient_scope') return 'consent';
  return '';
}

/* 시트 접근 토큰 문제는 자동 재발급하지 않는다(팝업 차단됨).
 *  - 요청 전송 이후 토큰 세대가 올라갔으면 = 이미 갱신됨 → 팝업 없이 새 토큰으로 재시도
 *  - 아니면 재허용 배너를 띄우고, 사용자가 허용한 뒤 원래 요청을 그대로 재시도
 * 그 외 401(ID 토큰 문제) 및 no_access/insufficient_scope 아닌 403(도메인)은 auth 오류로 올린다. */
function apiCall(path, opts) {
  var gen = sheetsTokenGen;
  return apiFetch(path, opts).then(function (r) {
    var kind = sheetsAccessKind(r);
    if (!kind) return r;
    if (sheetsTokenGen > gen) return apiFetch(path, opts);   // 늦게 도착한 401 → 팝업 없이 재시도
    return awaitSheetsAccess(kind).then(function () { return apiFetch(path, opts); });
  }).then(function (r) {
    var code = r.data && r.data.error;
    // 재허용 후에도 같은 오류 → 로그인 화면으로 튕기지 않고(작업 보존) 별도 오류로 올린다.
    if (sheetsAccessKind(r)) {
      var e0 = new Error('sheets_access'); e0.sheetsAccess = true; e0.status = r.status; throw e0;
    }
    if (r.status === 401) {
      var e = new Error('auth'); e.auth = true; e.status = 401; throw e;
    }
    // no_access(403)/not_found(404)는 본문을 그대로 넘기고, 그 외 403(도메인 권한)만 auth 오류로 처리
    if (r.status === 403 && code !== 'no_access') {
      var e2 = new Error('auth'); e2.auth = true; e2.status = 403; throw e2;
    }
    return r;
  });
}
/* @token-layer-end */

var coresLoaded = false;
function loadScript(src) {
  return new Promise(function (res, rej) {
    var s = document.createElement('script');
    s.src = src;
    s.onload = function () { res(); };
    s.onerror = function () { rej(new Error('스크립트 로드 실패: ' + src)); };
    document.head.appendChild(s);
  });
}
function loadCores() {
  if (coresLoaded) return Promise.resolve();
  return loadScript('/core/Core_Model.js')
    .then(function () { return loadScript('/core/Core_Validate.js'); })
    .then(function () { return loadScript('/core/Core_Recommend.js'); })
    .then(function () { coresLoaded = true; });
}

function authMsg(status) {
  return status === 403
    ? '이 앱은 gvcs-mg.org 계정만 사용할 수 있습니다.'
    : '로그인이 만료되었습니다. 다시 로그인해 주세요.';
}
function authErrMsg(err) {
  return authMsg(err && err.status);
}

/* 앱 화면(툴바)이 떠 있는지 — 흰 화면 방지 판정용 */
function appVisible() {
  return document.getElementById('toolbar').style.display === 'flex';
}

function handleErr(err) {
  if (err && err.auth) { showLogin(authErrMsg(err)); return; }
  show('loading', false);
  // 시트 권한 문제는 로그인 화면으로 튕기지 않는다(작업 상태 보존).
  if (err && err.sheetsAccess) {
    if (!appVisible()) { showSheetsGrant(err); return; }
    alert('시트 접근 권한을 확인하지 못했습니다. 하단 [다시 허용]을 눌러 주세요.');
    return;
  }
  alert('오류: ' + (err && err.message || err));
  // 흰 화면 금지: 앱 화면이 아직 안 떴으면 반드시 복구 가능한 화면을 남긴다.
  if (!appVisible()) showLogin('다시 로그인해 주세요.');
}

/* 시트 접근 권한 허용 화면(로그인 상태는 유지). 클릭 안에서 토큰을 요청한다. */
function showSheetsGrant(err) {
  showLogin(reauthFailMsg(err), true);
  var box = document.getElementById('sheetsGrant');
  var btn = document.getElementById('btnSheetsGrant');
  box.style.display = 'block';
  btn.disabled = false;
  btn.onclick = function () {
    btn.disabled = true;
    document.getElementById('loginMsg').textContent = '권한 창을 여는 중입니다…';
    requestSheetsToken('consent').then(function () {
      box.style.display = 'none';
      enterApp();
    }).catch(function (e2) {
      btn.disabled = false;
      document.getElementById('loginMsg').textContent = reauthFailMsg(e2);
    });
  };
}

function enterApp() {
  show('loginScreen', false);
  document.getElementById('sheetsGrant').style.display = 'none';
  show('loading', true, 'flex');
  // access token 이 없으면 1회 시도해 본다(로그인 직후라 제스처가 남아 있을 수 있다).
  // 실패하면 흰 화면 대신 [시트 접근 권한 허용] 버튼 화면을 남긴다.
  var ready = (DEV_MODE || sheetsToken) ? Promise.resolve('') : requestSheetsToken('');
  ready.catch(function (err) {
    showSheetsGrant(err);
    throw { handled: true };
  }).then(loadCores).then(bootstrap).catch(function (err) {
    if (err && err.handled) return;
    handleErr(err);
  });
}

/* 로그아웃 시 열려 있는 모달/오버레이와 모드 표시를 되돌린다(DOM 전용). */

/* @logout-start
 * 로컬 세션만 정리한다. 구글 계정 권한(scope)은 revoke 하지 않는다 —
 * revoke 하면 다음 로그인 때 동의 화면을 다시 거쳐야 해서 마찰만 커진다.
 * 최근 시트(RECENT_KEY)도 지우지 않는다(개인정보가 아니고 다음 사용자도 같은 시트를 쓴다).
 * 테스트가 이 구간을 통째로 추출한다 — DOM 은 showLogin/closeOverlays 에만 위임한다. */

/* 아직 시트에 반영되지 않은 편집이 남아 있는가 */
function hasUnsavedWork() {
  return !!(STATE.plan || STATE.unavailDirty || SETTINGS_DIRTY);
}

function doLogout() {
  if (DEV_MODE) return;
  if (hasUnsavedWork() && !confirm('저장하지 않은 변경이 있습니다. 로그아웃할까요?')) return;

  setToken('');                 // ID 토큰 삭제
  sheetsToken = '';             // 시트 접근 토큰(메모리) 폐기
  sheetsTokenGen++;             // 진행 중이던 요청이 옛 토큰으로 재시도하지 않도록 세대를 올린다
  tokenPending = null;
  accessPending = null;

  // 진행 중이던 작업 상태 정리
  STATE.target = null; STATE.plan = null; STATE.planTo = null; STATE.cellMap = null;
  STATE.undoStack = [];
  STATE.grid = null; STATE.config = null; STATE.model = null; STATE.user = '';
  STATE.unavailMode = false; STATE.unavailDirty = false;
  DRAFT = null;
  SETTINGS_DIRTY = false;

  // 이걸 빼면 다음 접속 때 자동으로 다시 로그인돼 로그아웃이 무의미해진다.
  if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
    google.accounts.id.disableAutoSelect();
  }

  closeOverlays();
  showLogin('로그아웃되었습니다.');
}
/* @logout-end */

function bootstrap() {
  if (!DEV_MODE) {
    try { STATE.sheetId = localStorage.getItem(RECENT_KEY) || ''; } catch (_) {}
  }
  return loadSheets().then(function (ok) {
    if (ok === false) return; // no_access
    return loadState(STATE.sheetId, null);
  });
}

/* GET /api/sheets → 탭 드롭다운/선택과목 구성. no_access면 false 반환. */
function loadSheets() {
  var q = STATE.sheetId ? ('?sheetId=' + encodeURIComponent(STATE.sheetId)) : '';
  return apiCall('/api/sheets' + q).then(function (r) {
    if (isNoSheet(r)) { renderNoSheet(); return false; }
    if (isSheetProblem(r)) { renderNoAccess(r.data, r.status); return false; }
    if (!r.data || !r.data.ok) throw new Error((r.data && r.data.error) || 'sheets_failed');
    if (r.data.devMode) markDev();
    STATE.sheetId = r.data.sheetId || STATE.sheetId;
    STATE.sheets = r.data.tabs || [];
    STATE.electives = r.data.electives || {};
    if (r.data.configVersion != null) STATE.configVersion = r.data.configVersion;
    if (!DEV_MODE && STATE.sheetId) { try { localStorage.setItem(RECENT_KEY, STATE.sheetId); } catch (_) {} }
    populateTabDropdown();
    return true;
  });
}

/* 아직 편집할 시트가 정해지지 않음(최근 시트도 배포 기본값도 없음) — 오류가 아니라 시작 상태다. */
function isNoSheet(r) {
  return !!(r && r.status === 400 && r.data && r.data.error === 'no_sheet_selected');
}

/* 시트 주소 입력 안내 화면. 툴바의 입력란에 붙여넣고 [열기] 하면 정상 진행된다. */
function renderNoSheet() {
  show('loading', false);
  show('toolbar', true, 'flex');
  show('gridWrap', true);
  setupSheetInput();
  document.getElementById('gridWrap').innerHTML =
    '<div style="padding:20px; max-width:560px; color:#444;">' +
    '<p><b>편집할 시간표 시트를 선택하세요.</b></p>' +
    '<p>위 입력란에 구글시트 <b>URL 또는 ID</b>를 붙여넣고 <b>[열기]</b>를 누르세요. ' +
    '한 번 열면 다음 접속 때 자동으로 다시 열립니다.</p>' +
    '</div>';
  try { document.getElementById('sheetInput').focus(); } catch (_) {}
}

/* 시트 자체 문제(권한 없음 403 / 없는 시트 404) — 로그인 화면으로 튕기지 않고 안내한다. */
function isSheetProblem(r) {
  var code = r && r.data && r.data.error;
  return (r.status === 403 && code === 'no_access') || (r.status === 404 && code === 'not_found');
}

/* ID 토큰(JWT) payload 에서 email 추출. STATE.user 는 /api/state 이후에만 채워지므로
 * 시트 오류 안내에서는 이 값을 쓴다. 실패하면 ''. */
function idTokenEmail() {
  try {
    var t = getToken();
    if (!t) return '';
    var p = t.split('.')[1];
    if (!p) return '';
    var b = p.replace(/-/g, '+').replace(/_/g, '/');
    while (b.length % 4) b += '=';
    var json = decodeURIComponent(atob(b).split('').map(function (c) {
      return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
    return JSON.parse(json).email || '';
  } catch (_) { return ''; }
}

function renderNoAccess(data, status) {
  show('loading', false);
  show('toolbar', true, 'flex');
  show('gridWrap', true);
  setupSheetInput();
  var reasons = ((data && data.reasons) || []).map(function (x) { return '<li>' + esc(x) + '</li>'; }).join('');
  var body;
  if (status === 404 || (data && data.error === 'not_found')) {
    body =
      '<p><b>시트를 찾을 수 없습니다.</b></p>' +
      '<p>주소(구글시트 URL 또는 ID)를 확인해 주세요. 삭제되었거나 오타일 수 있습니다.</p>';
  } else {
    var who = STATE.user || idTokenEmail();
    body =
      '<p><b>이 스프레드시트에 접근할 권한이 없습니다.</b></p>' +
      '<p>시트 소유자에게 ' + (who ? esc(who) + ' 계정으로' : '본인 계정으로') + ' 공유를 요청한 뒤 다시 열어 주세요. ' +
      '수정하려면 <b>편집자</b> 권한이 필요합니다.</p>';
  }
  document.getElementById('gridWrap').innerHTML =
    '<div style="padding:20px; color:#b3261e; max-width:560px;">' + body +
    (reasons ? '<ul>' + reasons + '</ul>' : '') +
    '</div>';
}

function loadState(sheetId, tab) {
  sheetId = (sheetId != null) ? sheetId : STATE.sheetId;
  tab = (tab != null) ? tab : STATE.tab;
  show('loading', true, 'flex');
  var q = [];
  if (sheetId) q.push('sheetId=' + encodeURIComponent(sheetId));
  if (tab) q.push('tab=' + encodeURIComponent(tab));
  var path = '/api/state' + (q.length ? ('?' + q.join('&')) : '');
  return apiCall(path).then(function (r) {
    // no_sheet_selected/no_access/not_found 는 로그인 화면으로 튕기지 않고 안내 화면을 보여준다.
    if (isNoSheet(r)) { renderNoSheet(); return; }
    if (isSheetProblem(r)) { renderNoAccess(r.data, r.status); return; }
    if (!r.data || !r.data.ok) throw new Error((r.data && r.data.error) || 'state_failed');
    onState(r.data);
  }).catch(function (err) {
    if (err && (err.auth || err.sheetsAccess)) { handleErr(err); return; }
    show('loading', false);
    alert('상태를 불러오지 못했습니다: ' + (err && err.message || err));
    if (!appVisible()) showLogin('다시 로그인해 주세요.');
  });
}

function onState(data) {
  if (data.devMode) markDev();
  STATE.grid = data.grid;
  STATE.config = data.config;
  STATE.warnings = data.warnings || [];
  STATE.linkedPinned = data.linkedPinned || {};
  STATE.depts = data.depts || null;
  STATE.version = data.version;
  if (data.configVersion != null) STATE.configVersion = data.configVersion;
  STATE.tab = data.tab;
  STATE.sheetId = data.sheetId || STATE.sheetId;
  STATE.dataStart = data.dataStart || 3;
  STATE.user = data.user || '';
  STATE.model = buildModel(STATE.grid.slice(STATE.dataStart - 1), STATE.dataStart);
  STATE.target = null; STATE.plan = null; STATE.planTo = null;

  document.getElementById('userInfo').textContent = STATE.user;
  setTabSelection();
  setupSheetInput();

  show('loading', false);
  show('toolbar', true, 'flex');
  show('gridWrap', true);
  renderGrid();
  updateToolbarNote();
  setGroupHint('');
  renderGradeFreeIfOpen();
}

/* =========================================================
   툴바: 시트 입력 / 탭 드롭다운
   ========================================================= */
function parseSheetId(v) {
  v = String(v || '').trim();
  if (!v) return '';
  var m = /\/d\/([a-zA-Z0-9\-_]+)/.exec(v);
  if (m) return m[1];
  return v;
}

function setupSheetInput() {
  var inp = document.getElementById('sheetInput');
  if (DEV_MODE) {
    inp.disabled = true;
    document.getElementById('btnOpen').disabled = true;
    document.getElementById('sheetNote').textContent = '개발 모드: 모의 시트 고정';
    return;
  }
  if (document.activeElement !== inp) inp.value = STATE.sheetId || '';
}

function populateTabDropdown() {
  var sel = document.getElementById('tabSelect');
  var html = '';
  (STATE.sheets || []).forEach(function (t) {
    var label = t.title + (t.isTimetable ? '' : ' (형식 아님)');
    html += '<option value="' + esc(t.title) + '"' + (t.isTimetable ? '' : ' disabled') + '>' + esc(label) + '</option>';
  });
  sel.innerHTML = html;
  setTabSelection();
}

function setTabSelection() {
  var sel = document.getElementById('tabSelect');
  if (STATE.tab != null) sel.value = STATE.tab;
}

function openSheet() {
  if (DEV_MODE) return;
  var id = parseSheetId(document.getElementById('sheetInput').value);
  if (!id) { alert('구글시트 URL 또는 ID를 입력하세요.'); return; }
  STATE.sheetId = id;
  STATE.tab = null;
  clearUndoStack();
  show('loading', true, 'flex');
  loadSheets().then(function (ok) {
    if (ok === false) return;
    return loadState(STATE.sheetId, null);
  }).catch(handleErr);
}

function duplicateTab() {
  if (!STATE.tab) return;
  clearUndoStack();
  show('loading', true, 'flex');
  apiCall('/api/duplicate-tab', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sheetId: STATE.sheetId, tab: STATE.tab })
  }).then(function (r) {
    if (!r.data || !r.data.ok) { show('loading', false); alert('탭 복제 실패: ' + ((r.data && r.data.error) || r.status)); return; }
    var newTab = r.data.tab;
    STATE.tab = newTab;
    return loadSheets().then(function (ok) {
      if (ok === false) return;
      return loadState(STATE.sheetId, newTab);
    });
  }).catch(function (err) {
    show('loading', false);
    if (err && (err.auth || err.sheetsAccess)) { handleErr(err); return; }
    alert('탭 복제 실패: ' + (err && err.message || err));
  });
}

/* =========================================================
   렌더링
   ========================================================= */
function cellKey(row, idx) { return row + '_' + idx; }

function blockAtIdx(idx) {
  var blocks = (STATE.config && STATE.config.fixedBlocks) || [];
  for (var i = 0; i < blocks.length; i++) {
    var b = blocks[i];
    if (b.day * 8 + (b.period - 1) === idx) return b;
  }
  return null;
}
function blockScopeText(b) {
  var parts = [];
  if (b.grades === 'all') parts.push('전 학년');
  else if (Array.isArray(b.grades) && b.grades.length) parts.push('학년 ' + b.grades.join(','));
  if (Array.isArray(b.classes) && b.classes.length) parts.push('반 ' + b.classes.join(','));
  if (Array.isArray(b.partialGrades) && b.partialGrades.length) parts.push('일부 ' + b.partialGrades.join(',') + '(정규 금지)');
  if (!parts.length) parts.push('경고 전용(대상 미지정)');
  return parts.join(' / ');
}
function blockTooltip(b) { return (b.label || '금지 슬롯') + ' — ' + blockScopeText(b); }

function deptBoundaryRows(entries, depts) {
  if (!depts || !depts.names || !Array.isArray(depts.order)) return {};
  var names = depts.names, order = depts.order;
  var oi = function (d) { return d == null ? -1 : order.indexOf(d); };
  var ents = entries || [];
  var tIdx = [];
  for (var k = 0; k < ents.length; k++) if (ents[k].type === 'teacher') tIdx.push(k);
  var out = {};
  var cur = null;
  for (var t = 0; t < tIdx.length; t++) {
    var e = ents[tIdx[t]];
    var d = names[e.name];
    if (d === undefined) d = null;
    if (d === null || d === cur) continue;
    if (cur === null) { cur = d; continue; }
    var nextE = (t + 1 < tIdx.length) ? ents[tIdx[t + 1]] : null;
    var nextD = nextE ? names[nextE.name] : undefined;
    if (nextD === undefined) nextD = null;
    var ai = oi(cur), di = oi(d);
    var condA = (di > ai) && (nextD === d || di === ai + 1);
    var condB = (nextD === d);
    if (condA || condB) { out[e.row] = true; cur = d; }
  }
  for (var r = 0; r < ents.length; r++) {
    if (ents[r].type === 'raSlot' || ents[r].type === 'raCourse') { out[ents[r].row] = true; break; }
  }
  return out;
}

function renderGrid() {
  clearSelection();
  var wrap = document.getElementById('gridWrap');
  var i;
  // table-layout:fixed는 테이블 폭이 auto면 무시됨 → 명시 폭 + colgroup으로 열 폭 강제
  var NAME_W = 84, SLOT_W = 44;
  var blockCls = [];
  var html = '<table class="grid" style="width:' + (NAME_W + SLOT_COUNT * SLOT_W) + 'px">';
  html += '<colgroup><col style="width:' + NAME_W + 'px">';
  for (i = 0; i < SLOT_COUNT; i++) html += '<col style="width:' + SLOT_W + 'px">';
  html += '</colgroup><thead><tr><th class="corner name"></th>';
  for (i = 0; i < SLOT_COUNT; i++) {
    var blk = blockAtIdx(i);
    var mark = '';
    var ttl = blk ? esc(blockTooltip(blk)) : '';
    var bcls = blk ? (blk.grades === 'all' ? ' blk-all' : ' blk-part') : '';
    if (i > 0 && i % 8 === 0) bcls += ' day-start';
    blockCls[i] = bcls;
    html += '<th class="slot-h' + bcls + '" data-idx="' + i + '" title="' + ttl + '">' + slotLabel(i) + mark + '</th>';
  }
  html += '</tr></thead><tbody>';
  var deptSet = deptBoundaryRows(STATE.model.entries, STATE.depts);
  var headSet = {};
  ((STATE.depts && STATE.depts.heads) || []).forEach(function (nm) { headSet[nm] = true; });
  var gfDone = false;
  STATE.model.entries.forEach(function (e) {
    var isTeacher = e.type === 'teacher';
    if (!isTeacher && !gfDone) { html += gradeFreeGridRowsHtml(); gfDone = true; }
    var trCls = [];
    if (!isTeacher) trCls.push('ra-row');
    if (deptSet[e.row]) trCls.push('dept-start');
    html += '<tr' + (trCls.length ? ' class="' + trCls.join(' ') + '"' : '') + '>';
    var nameCls = 'name' + (isTeacher && headSet[e.name] ? ' dept-head' : '');
    html += '<th class="' + nameCls + '" title="' + esc(e.name) + '">' + esc(e.name) + '</th>';
    // 같은 요일에 같은 과목이 2회 이상 배치된 슬롯 표시(dup-day)
    // 단, 고정 시간(pinned)이 지정된 과목(연강 선택과목 등)은 제외
    var dupIdx = {};
    if (isTeacher) {
      for (var dd0 = 0; dd0 < 5; dd0++) {
        var cnt = {};
        for (var k0 = 0; k0 < 8; k0++) {
          var sv = e.slots[dd0 * 8 + k0];
          if (!sv) continue;
          var psv = pinnedSlotsOf(sv);
          if (psv && psv.length) continue;
          cnt[sv] = (cnt[sv] || 0) + 1;
        }
        for (var k1 = 0; k1 < 8; k1++) { var sv1 = e.slots[dd0 * 8 + k1]; if (sv1 && cnt[sv1] > 1) dupIdx[dd0 * 8 + k1] = true; }
      }
    }
    for (i = 0; i < SLOT_COUNT; i++) {
      var v = e.slots[i];
      var tdCls = (v ? 'filled' : '') + blockCls[i];
      if (dupIdx[i]) tdCls += ' dup-day';
      var unav = isTeacher && typeof isUnavailable === 'function' && isUnavailable(STATE.config, e, i);
      var uttl = '';
      if (unav && !v) tdCls += ' unavail';
      else if (unav && v) { tdCls += ' unavail-warn'; uttl = ' title="교사 불가 시간에 배정된 수업"'; }
      if (isTeacher && v) {
        var ps = pinnedSlotsOf(v);
        if (ps && ps.indexOf(i) !== -1) tdCls += ' pinned';
      }
      var cls = tdCls ? ' class="' + tdCls.trim() + '"' : '';
      // RA 행은 표시 전용 — data-erow 없이 렌더해 이동 대상(클릭)에서 제외
      var dataAttr = isTeacher ? ' data-erow="' + e.row + '" data-idx="' + i + '"' : '';
      html += '<td' + cls + uttl + dataAttr + '>' + (v ? '<div class="cb">' + esc(v) + '</div>' : '') + '</td>';
    }
    html += '</tr>';
  });
  if (!gfDone) html += gradeFreeGridRowsHtml();
  html += '</tbody></table>';
  wrap.innerHTML = html;

  STATE.cellMap = {};
  wrap.querySelectorAll('td[data-erow]').forEach(function (td) {
    STATE.cellMap[cellKey(+td.dataset.erow, +td.dataset.idx)] = td;
    td.addEventListener('click', onCellClick);
  });
  wrap.querySelectorAll('td.gfr-all,td.gfr-some,td.gfr-partial').forEach(function (td) {
    td.addEventListener('click', function () {
      openRaAssign(+td.dataset.day, +td.dataset.period, +td.dataset.grade);
    });
  });
  fitCells();
}

function fitCells() {
  requestAnimationFrame(function () {
    var boxes = document.querySelectorAll('#gridWrap td .cb');
    for (var j = 0; j < boxes.length; j++) {
      var box = boxes[j];
      if (box.offsetParent === null) continue; // skip hidden (collapsed ra rows)
      var td = box.parentNode;
      var warn = td.classList.contains('unavail-warn');
      var size = 8;
      box.style.fontSize = '8px';
      if (!warn) td.removeAttribute('title'); // unavail-warn 경고 타이틀 보존
      while (size > 7 && box.scrollHeight > box.clientHeight) {
        size--;
        box.style.fontSize = size + 'px';
      }
      if (!warn && box.scrollHeight > box.clientHeight) {
        td.title = box.textContent;
      }
    }
  });
}

function cellAt(row, idx) { return STATE.cellMap[cellKey(row, idx)]; }
function paint(row, idx, colorCls) { var td = cellAt(row, idx); if (td) td.classList.add(colorCls); }

/* 툴바 알림: 설정 탭 없음 안내(최우선) 또는 고정시간 인식불가 경고.
   미분류 과목 수는 표시하지 않는다 — 설정 > 무반 과목/학년별 시간표 탭에서 확인한다. */
function updateToolbarNote() {
  var el = document.getElementById('toolbarNote');
  if (STATE.config && STATE.config.missing) {
    el.textContent = '설정 탭이 없습니다 — [설정]에서 규칙을 저장하면 생성됩니다';
    return;
  }
  el.textContent = (STATE.warnings && STATE.warnings.length)
    ? '고정시간 인식불가: ' + STATE.warnings.join(', ')
    : '';
}

function setGroupHint(t) { document.getElementById('groupHint').textContent = t || ''; }

function pinnedSlotsOf(subject) {
  var p = (STATE.config && STATE.config.pinned) || {};
  return Object.prototype.hasOwnProperty.call(p, subject) ? (p[subject] || []) : null;
}

/* =========================================================
   선택 / 하이라이트
   ========================================================= */
function clearHighlights() {
  if (!STATE.cellMap) return;
  Object.keys(STATE.cellMap).forEach(function (k) {
    var td = STATE.cellMap[k];
    td.classList.remove('hl-green', 'hl-yellow', 'hl-blue', 'hl-orange', 'cand');
  });
}
function clearSelection() {
  clearHighlights();
  STATE.target = null; STATE.plan = null; STATE.plans = null; STATE.planTo = null;
  show('panel', false);
  setPanelCollapsed(false); // 숨겨진 뒤 다음에 나타날 때 펼친 상태로 시작
  setGroupHint('');
}

function onCellClick(ev) {
  var td = ev.currentTarget;
  var erow = +td.dataset.erow, idx = +td.dataset.idx;
  // RA 감독 셀은 이동 시작이 아니라 해제 확인 — 다른 모든 로직보다 먼저 가로챈다
  var raEntry = STATE.model.entries.find(function (e) { return e.row === erow; });
  if (raEntry && isRaValue(raEntry.slots[idx])) {
    if (window.confirm('RA 감독 배정을 해제할까요?')) raClearCell(erow, idx);
    return;
  }
  if (STATE.unavailMode) { toggleUnavail(erow, idx); return; }
  if (td.classList.contains('cand') && STATE.target) { selectPlan(idx); return; }
  if (td.classList.contains('pinned')) {
    var entry = STATE.model.entries.find(function (e) { return e.row === erow; });
    var subj = entry ? entry.slots[idx] : '';
    var labs = (pinnedSlotsOf(subj) || []).map(function (x) { return slotLabel(x); }).join(', ');
    clearSelection();
    setGroupHint('고정 수업입니다 — 이동할 수 없습니다(고정: ' + labs + ')');
    return;
  }
  if (td.classList.contains('filled')) { selectTarget(erow, idx); return; }
  clearSelection();
}

/* =========================================================
   교사별 수업 불가 시간 등록 모드
   ========================================================= */
function toggleUnavail(erow, idx) {
  var entry = STATE.model.entries.find(function (e) { return e.row === erow; });
  if (!entry || entry.type !== 'teacher') return; // RA행 제외
  var dupName = STATE.model.entries.filter(function (e) {
    return e.type === 'teacher' && e.name === entry.name;
  }).length > 1;
  var list = STATE.config.unavailable = STATE.config.unavailable || [];
  var rec = list.find(function (r) {
    return r.name === entry.name && (dupName ? r.row === entry.row : r.row == null);
  });
  if (rec) {
    var p = rec.slots.indexOf(idx);
    if (p !== -1) rec.slots.splice(p, 1); else rec.slots.push(idx);
    if (!rec.slots.length) { var li = list.indexOf(rec); if (li !== -1) list.splice(li, 1); }
  } else {
    var nr = { name: entry.name, slots: [idx] };
    if (dupName) nr.row = entry.row;
    list.push(nr);
  }
  STATE.unavailDirty = true;
  renderGrid();
}

function toggleUnavailMode() {
  var btn = document.getElementById('btnUnavailMode');
  if (STATE.unavailMode) { exitUnavailMode(); return; }
  STATE.unavailMode = true;
  STATE.unavailDirty = false;
  btn.classList.add('active');
  document.body.classList.add('unavail-mode');
  clearSelection();
}

function exitUnavailMode() {
  if (!STATE.unavailMode) return;
  STATE.unavailMode = false;
  document.getElementById('btnUnavailMode').classList.remove('active');
  document.body.classList.remove('unavail-mode');
  var dirty = STATE.unavailDirty;
  STATE.unavailDirty = false;
  if (dirty) postConfig(cloneConfig(STATE.config));
}

function selectTarget(erow, idx) {
  clearSelection();
  var entry = STATE.model.entries.find(function (e) { return e.row === erow; });
  if (!entry) return;
  if (entry.type !== 'teacher') return;
  var subject = entry.slots[idx];
  if (!subject) return;
  if (isRaValue(entry.slots[idx])) return; // RA 감독 셀은 이동 대상 제외
  STATE.target = { name: entry.name, row: entry.row, fromIdx: idx };

  // 선택 셀 + 동반 이동 셀(팀티칭·연결그룹) 파랑 — 실제 이동 단위(expandUnit)와 동일 기준
  paint(entry.row, idx, COLORS.blue);
  expandUnit(STATE.model, STATE.config, { name: entry.name, row: entry.row, fromIdx: idx, toIdx: idx }).forEach(function (mv) {
    if (mv.row === entry.row) return;
    paint(mv.row, idx, COLORS.blue);
  });

  // 연결 그룹 안내(F3)
  var grp = groupOf(STATE.config, subject);
  setGroupHint(grp ? ('그룹 ' + grp.name + ' — 이동 시 함께 이동합니다') : '');

  // 후보 목적지 하이라이트 (경량 배치 스캔: 40슬롯을 1회·공유 노드 예산으로 스캔)
  var scan = planScanAll(STATE.model, STATE.config, STATE.target);
  for (var to = 0; to < SLOT_COUNT; to++) {
    var plan = scan[to];
    if (!plan) continue;
    var td = cellAt(STATE.target.row, to);
    if (!td) continue;
    td.classList.add('cand', plan.kind === 'direct' ? COLORS.green : COLORS.yellow);
  }
}

// 이동 세그먼트 문자열: `${subject} ${slotLabel(from)}→${slotLabel(to)}` (subject는 esc)
function planMoveSegs(plan) {
  return plan.moves.map(function (mv) {
    var e = STATE.model.entries.find(function (en) { return en.row === mv.row; });
    var subject = e ? e.slots[mv.fromIdx] : '';
    return esc(subject) + ' ' + slotLabel(mv.fromIdx) + '→' + slotLabel(mv.toIdx);
  });
}

function selectPlan(toIdx) {
  var plans = planMovesTo(STATE.model, STATE.config, STATE.target, toIdx);
  if (!plans || !plans.length) return;
  STATE.plans = plans; STATE.planTo = toIdx;

  // 경로 선택 UI (2개 이상일 때만)
  var pathsEl = document.getElementById('planPaths');
  if (plans.length >= 2) {
    var html = '<div class="paths-head">이동 방법 ' + plans.length + '가지</div>';
    plans.forEach(function (p, i) {
      var label = '경로 ' + (i + 1) + ' (' + p.moves.length + '건): ' + planMoveSegs(p).join(' · ');
      html += '<label><input type="radio" name="planPath" value="' + i + '"' +
        (i === 0 ? ' checked' : '') + '>' + label + '</label>';
    });
    pathsEl.innerHTML = html;
    Array.prototype.forEach.call(pathsEl.querySelectorAll('input[name="planPath"]'), function (r) {
      r.addEventListener('change', function () { renderSelectedPlan(+this.value); });
    });
  } else {
    pathsEl.innerHTML = '';
  }

  renderSelectedPlan(0); // 기본 선택 = 첫 경로(최소 이동)
}

// 선택된 경로 i 를 프리뷰(주황 페인트 + 단계 목록 + 그룹 안내)로 렌더.
function renderSelectedPlan(i) {
  var plan = STATE.plans[i];
  STATE.plan = plan;

  clearHighlights();
  plan.moves.forEach(function (mv) {
    paint(mv.row, mv.fromIdx, COLORS.orange);
    paint(mv.row, mv.toIdx, COLORS.orange);
  });

  // 연결 그룹 안내(F3): 함께 이동하는 행 수
  var tEntry = STATE.model.entries.find(function (e) { return e.row === STATE.target.row; });
  var tSubj = tEntry ? tEntry.slots[STATE.target.fromIdx] : '';
  var grp = groupOf(STATE.config, tSubj);
  setGroupHint(grp ? ('그룹 ' + grp.name + ': ' + plan.moves.length + '개 행 함께 이동') : '');

  document.getElementById('panelSteps').innerHTML =
    planMoveSegs(plan).map(function (s) { return '<li>' + s + '</li>'; }).join('');

  // 라디오 상태 동기화
  var radio = document.querySelector('#planPaths input[name="planPath"][value="' + i + '"]');
  if (radio) radio.checked = true;

  setPanelCollapsed(false); // 새 계획 선택 시 항상 펼친 상태로
  show('panel', true);
}

/* =========================================================
   확정 (POST /api/apply)
   ========================================================= */
function confirmPlan() {
  if (!STATE.plan) return;
  show('loading', true, 'flex');
  apiCall('/api/apply', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      sheetId: STATE.sheetId, tab: STATE.tab, moves: STATE.plan.moves,
      baseVersion: STATE.version, kind: STATE.plan.kind
    })
  }).then(function (r) {
    show('loading', false);
    if (r.status === 409) {
      var reasons = (r.data && r.data.reasons) || ['시트가 변경되었습니다.'];
      var pre = (r.data && r.data.preexisting) || [];
      var msg = reasons.join('\n');
      if (pre.length) msg += '\n\n[기존 충돌(차단 아님)]\n' + pre.join('\n');
      alert(msg);
      loadState(STATE.sheetId, STATE.tab);
      return;
    }
    if (!r.data || !r.data.ok) { alert('적용 실패: ' + (r.data && r.data.error || r.status)); return; }
    // 되돌리기 스택 push: 확정 직전(pre-apply) 모델 기준 요약 + 역방향 moves.
    var undoEntry = {
      tab: STATE.tab,
      moves: STATE.plan.moves.map(function (mv) {
        return { name: mv.name, row: mv.row, fromIdx: mv.toIdx, toIdx: mv.fromIdx };
      }),
      summary: undoSummaryOf(STATE.plan.moves)
    };
    STATE.grid = r.data.grid;
    STATE.version = r.data.version;
    if (r.data.configVersion != null) STATE.configVersion = r.data.configVersion;
    STATE.tab = r.data.tab;
    STATE.config = r.data.config;
    STATE.dataStart = r.data.dataStart || STATE.dataStart;
    STATE.model = buildModel(STATE.grid.slice(STATE.dataStart - 1), STATE.dataStart);
    STATE.undoStack.push(undoEntry);
    updateUndoButton();
    renderGrid();
    updateToolbarNote();
    setGroupHint('');
    renderGradeFreeIfOpen();
  }).catch(function (err) {
    show('loading', false);
    if (err && (err.auth || err.sheetsAccess)) { handleErr(err); return; }
    alert('적용 실패: ' + (err && err.message || err));
  });
}

/* =========================================================
   되돌리기 (undo) — 스택 top 의 역방향 moves 를 kind:'undo' 로 재전송
   ========================================================= */
// 원본(정방향) moves 로부터 요약 문자열 생성: "Kor7C 월2→월1 외 N건" (pre-apply 모델 기준).
function undoSummaryOf(moves) {
  var m0 = moves[0];
  var e = STATE.model.entries.find(function (en) { return en.row === m0.row; });
  var subj = e ? e.slots[m0.fromIdx] : '';
  var s = subj + ' ' + slotLabel(m0.fromIdx) + '→' + slotLabel(m0.toIdx);
  if (moves.length > 1) s += ' 외 ' + (moves.length - 1) + '건';
  return s;
}

function updateUndoButton() {
  var btn = document.getElementById('btnUndo');
  if (!btn) return;
  var n = STATE.undoStack.length;
  btn.disabled = n === 0;
  btn.title = n ? ('되돌리기 (Ctrl+Z) — 마지막 이동: ' + STATE.undoStack[n - 1].summary) : '되돌리기 (Ctrl+Z)';
}

function clearUndoStack() {
  STATE.undoStack = [];
  updateUndoButton();
}

function doUndo() {
  if (!STATE.undoStack.length) return;
  var top = STATE.undoStack[STATE.undoStack.length - 1];
  clearSelection();
  show('loading', true, 'flex');
  var undoBody = { sheetId: STATE.sheetId, tab: STATE.tab, baseVersion: STATE.version };
  if (top.moves) { undoBody.moves = top.moves; undoBody.kind = 'undo'; }
  else {
    undoBody.kind = top.kind;
    if (top.assigns) undoBody.assigns = top.assigns;
    if (top.clears) undoBody.clears = top.clears;
  }
  apiCall('/api/apply', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(undoBody)
  }).then(function (r) {
    show('loading', false);
    if (r.status === 409) {
      // 그 사이 자리가 점유됨 → 사유 표시, 스택 유지(상황 해결 후 재시도). loadState 는 스택을 비우지 않음.
      var reasons = (r.data && r.data.reasons) || ['시트가 변경되었습니다.'];
      var pre = (r.data && r.data.preexisting) || [];
      var msg = reasons.join('\n');
      if (pre.length) msg += '\n\n[기존 충돌(차단 아님)]\n' + pre.join('\n');
      alert(msg);
      loadState(STATE.sheetId, STATE.tab);
      return;
    }
    if (!r.data || !r.data.ok) { alert('되돌리기 실패: ' + (r.data && r.data.error || r.status)); return; }
    STATE.grid = r.data.grid;
    STATE.version = r.data.version;
    if (r.data.configVersion != null) STATE.configVersion = r.data.configVersion;
    STATE.tab = r.data.tab;
    STATE.config = r.data.config;
    STATE.dataStart = r.data.dataStart || STATE.dataStart;
    STATE.model = buildModel(STATE.grid.slice(STATE.dataStart - 1), STATE.dataStart);
    STATE.undoStack.pop();
    updateUndoButton();
    renderGrid();
    updateToolbarNote();
    setGroupHint('');
    renderGradeFreeIfOpen();
    if (isRaAssignOpen()) renderRaAssign();
    toast('이동을 되돌렸습니다');
  }).catch(function (err) {
    show('loading', false);
    if (err && (err.auth || err.sheetsAccess)) { handleErr(err); return; }
    alert('되돌리기 실패: ' + (err && err.message || err));
  });
}

/* =========================================================
   설정 저장 (POST /api/config) — F2/F3/F4 공용
   ========================================================= */
function cloneConfig(c) {
  var out;
  try { out = JSON.parse(JSON.stringify(c || {})); } catch (_) { out = {}; }
  delete out.missing;
  return out;
}

function postConfig(config, keepOpen) {
  show('loading', true, 'flex');
  return apiCall('/api/config', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sheetId: STATE.sheetId, config: config, baseConfigVersion: STATE.configVersion })
  }).then(function (r) {
    if (r.status === 503 && r.data && r.data.error === 'config_unavailable') {
      show('loading', false);
      alert('설정을 불러오지 못해 저장할 수 없습니다.\n새로고침 후 다시 시도해 주세요.');
      return;
    }
    if (r.status === 409 && r.data && r.data.error === 'stale_config') {
      show('loading', false);
      alert('다른 사용자가 설정을 변경했습니다. 최신 상태를 불러왔습니다.\n내용 확인 후 [저장]을 다시 눌러 주세요.');
      // 팝업·DRAFT(내 편집분)는 유지하고 버전만 갱신되도록 상태 재로드
      return loadState(STATE.sheetId, STATE.tab).then(function () { if (keepOpen) { SETTINGS_DIRTY = true; } });
    }
    if (!r.data || !r.data.ok) { show('loading', false); alert('설정 저장 실패: ' + ((r.data && r.data.error) || r.status)); return; }
    return loadState(STATE.sheetId, STATE.tab).then(function () {
      var open = document.getElementById('settings').classList.contains('open');
      if (keepOpen && open) {
        buildDraftFromConfig();
        renderSettings();
      }
      toast('설정을 저장했습니다');
    });
  }).catch(function (err) {
    show('loading', false);
    if (err && (err.auth || err.sheetsAccess)) { handleErr(err); return; }
    alert('설정 저장 실패: ' + (err && err.message || err));
  });
}

var TOAST_TIMER = null;
function toast(msg) {
  var el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('on');
  if (TOAST_TIMER) clearTimeout(TOAST_TIMER);
  TOAST_TIMER = setTimeout(function () { el.classList.remove('on'); }, 2000);
}
/* =========================================================
   설정 패널 (F1 삭제목록 / F3 연결그룹 / F4 무반 / 팀티칭)
   ========================================================= */
function subjectsInGrid() {
  var set = {};
  STATE.model.entries.forEach(function (e) {
    if (e.type !== 'teacher') return;
    for (var i = 0; i < SLOT_COUNT; i++) { var s = e.slots[i]; if (s) set[s] = true; }
  });
  return Object.keys(set).sort();
}
function teachersInGrid() {
  var set = {};
  STATE.model.entries.forEach(function (e) { if (e.type === 'teacher') set[e.name] = true; });
  return Object.keys(set).sort();
}
// 현재 탭 그리드에 실제로 존재하는 무반 과목만 표시.
// (설정에만 있고 이 탭에 없는 과목은 숨기되 DRAFT에는 남아 저장 시 보존됨)
function classlessCandidates() {
  var set = {};
  STATE.model.entries.forEach(function (e) {
    if (e.type !== 'teacher') return;
    for (var i = 0; i < SLOT_COUNT; i++) { var s = e.slots[i]; if (s && !parseSubject(s)) set[s] = true; }
  });
  return Object.keys(set).sort();
}
// 설정에는 있지만 현재 탭 그리드에 없는 무반 과목 수 (안내용)
function classlessHiddenCount() {
  var grid = {};
  classlessCandidates().forEach(function (s) { grid[s] = true; });
  return Object.keys((DRAFT && DRAFT.classless) || {}).filter(function (s) { return !grid[s]; }).length;
}
function selectedValues(sel) {
  var out = [];
  for (var i = 0; i < sel.options.length; i++) if (sel.options[i].selected) out.push(sel.options[i].value);
  return out;
}
function optionsHtml(options, selected) {
  var selMap = {}; (selected || []).forEach(function (s) { selMap[s] = true; });
  var opts = options.slice();
  (selected || []).forEach(function (s) { if (opts.indexOf(s) === -1) opts.push(s); });
  return opts.map(function (o) {
    return '<option value="' + esc(o) + '"' + (selMap[o] ? ' selected' : '') + '>' + esc(o) + '</option>';
  }).join('');
}

// 저장된 fixedBlocks(grades: 'all' 축약형 포함) → 편집용 형태(grades 배열)로 정규화.
// 금지 슬롯 탭과 학년별 시간표 탭이 같은 편집 형태를 쓰도록 공용화한다.
function normalizeBlocks(raw) {
  return (raw || []).map(function (b) {
    return { day: b.day, period: b.period, label: b.label || '',
      grades: (b.grades === 'all') ? [7, 8, 9, 10, 11, 12] : (b.grades || []).slice(),
      partialGrades: (b.partialGrades || []).slice(),
      classes: (b.classes || []).slice() };
  });
}

function buildDraftFromConfig() {
  var c = STATE.config || {};
  DRAFT = {
    fixedBlocks: normalizeBlocks(c.fixedBlocks),
    groups: (function () { var g = c.linkedGroups || {}; return Object.keys(g).map(function (k) { return { name: k, subjects: (g[k] || []).slice() }; }); })(),
    classless: (function () { var o = {}, m = c.classless || {}; Object.keys(m).forEach(function (k) { o[k] = (m[k] || []).slice(); }); return o; })(),
    team: (function () { var t = c.teamTeaching || {}; return Object.keys(t).map(function (k) { return { subject: k, teachers: (t[k] || []).slice() }; }); })(),
    unavailable: (c.unavailable || []).map(function (u) { var o = { name: u.name, slots: (u.slots || []).slice() }; if (u.row != null) o.row = u.row; return o; }),
    pinned: (function () { var p = (STATE.config && STATE.config.pinned) || {}; return Object.keys(p).map(function (k) { return { subject: k, slots: (p[k] || []).slice() }; }); })()
  };
}

function isSettingsOpen() { return document.getElementById('settings').classList.contains('open'); }

function openSettings() {
  buildDraftFromConfig();
  SETTINGS_TAB = 'gradefree';
  SETTINGS_DIRTY = false;
  // 열림 표시가 먼저다 — 학년별 시간표 매트릭스는 isSettingsOpen()이 참일 때만 그려진다.
  document.getElementById('backdrop').classList.add('on');
  document.getElementById('settings').classList.add('open');
  renderSettings();
}

function closeSettings() {
  if (SETTINGS_DIRTY && !confirm('저장하지 않은 변경이 있습니다. 닫을까요?')) return;
  document.getElementById('settings').classList.remove('open');
  if (!isRaAssignOpen()) document.getElementById('backdrop').classList.remove('on');
}

function applySettingsTab() {
  var body = document.getElementById('settingsBody');
  body.querySelectorAll('.sec').forEach(function (sec) {
    sec.style.display = (sec.getAttribute('data-tab') === SETTINGS_TAB) ? '' : 'none';
  });
  document.querySelectorAll('#settingsTabs button').forEach(function (b) {
    b.classList.toggle('active', b.getAttribute('data-tab') === SETTINGS_TAB);
  });
  // 모든 탭이 DRAFT + [저장] 방식이다 → 푸터를 숨기는 탭은 없다.
}
function switchSettingsTab(tab) {
  SETTINGS_TAB = tab;
  applySettingsTab();
  renderGradeFreeIfOpen();   // 학년별 시간표 탭으로 들어올 때 최신 상태로 그린다
  // 이전 탭에서 스크롤해 둔 위치가 남아 새 탭이 중간부터 보이는 것을 막는다.
  var body = document.getElementById('settingsBody');
  if (body) body.scrollTop = 0;
}

function blockRowHtml(b, bi, dupIdx) {
  var grades = b.grades || [], partialGrades = b.partialGrades || [], classes = b.classes || [];
  var isAll = [7, 8, 9, 10, 11, 12].every(function (g) { return grades.indexOf(g) !== -1; });
  var slotIdx = b.day * 8 + (b.period - 1);
  var emptyTarget = !isAll && !grades.length && !partialGrades.length && !classes.length;

  var h = '<div class="blk-row">';
  // 1행: 슬롯 선택(요일·교시) + 라벨 + 상태 배지 + 삭제
  h += '<div class="row">';
  h += '<select data-f="bday" data-i="' + bi + '">';
  for (var d = 0; d < 5; d++) h += '<option value="' + d + '"' + (b.day === d ? ' selected' : '') + '>' + DAYS[d] + '</option>';
  h += '</select>';
  h += '<select data-f="bperiod" data-i="' + bi + '">';
  for (var p = 1; p <= 8; p++) h += '<option value="' + p + '"' + (b.period === p ? ' selected' : '') + '>' + p + '교시</option>';
  h += '</select>';
  h += '<input type="text" data-f="blabel" data-i="' + bi + '" value="' + esc(b.label || '') + '" placeholder="예: 전교 조회">';
  if (isAll) h += '<span class="blk-badge-all">전 학년 금지</span>';
  else if (grades.length || partialGrades.length || classes.length) h += '<span class="blk-badge-part">일부</span>';
  h += '</div>';

  // 2행: 대상 칩 + 추가
  h += '<div class="row">';
  grades.forEach(function (g) {
    h += '<span class="chip">' + g + '<button class="chip-x" data-act="fbChipRemove" data-i="' + bi + '" data-tok="' + g + '">×</button></span>';
  });
  partialGrades.forEach(function (g) {
    h += '<span class="chip">' + g + '일부<button class="chip-x" data-act="fbChipRemove" data-i="' + bi + '" data-tok="' + g + '일부">×</button></span>';
  });
  classes.forEach(function (cl) {
    h += '<span class="chip">' + esc(cl) + '<button class="chip-x" data-act="fbChipRemove" data-i="' + bi + '" data-tok="' + esc(cl) + '">×</button></span>';
  });
  if (!grades.length && !partialGrades.length && !classes.length) h += '<span class="muted">대상 없음</span>';
  h += '<button data-act="fbOpen" data-i="' + bi + '" style="margin-left:auto">+ 추가</button>';
  h += '<button data-act="delBlock" data-i="' + bi + '">삭제</button>';
  h += '</div>';

  // 인라인 경고
  if (emptyTarget) h += '<div class="warn">⚠ 대상이 없으면 경고만 표시됩니다</div>';
  if (dupIdx && dupIdx[slotIdx]) h += '<div class="warn">⚠ 같은 요일·교시 규칙이 중복됩니다</div>';

  // 대상 선택 패널
  if (FB_UI.open[bi]) {
    h += '<div class="pick-panel cl-picker">';
    h += '<div class="cl-picker-row"><span class="muted">학년 전체</span>';
    [7, 8, 9, 10, 11, 12].forEach(function (g) {
      var dis = (grades.indexOf(g) !== -1) ? ' disabled' : '';
      h += '<button data-act="fbPick" data-i="' + bi + '" data-tok="' + g + '"' + dis + '>' + g + '</button>';
    });
    h += '<button data-act="fbPickAllGrades" data-i="' + bi + '"' + (isAll ? ' disabled' : '') + '>전체</button>';
    h += '</div>';
    h += '<div class="cl-picker-row"><span class="muted">학년 일부</span>';
    [7, 8, 9, 10, 11, 12].forEach(function (g) {
      var tok = g + '일부';
      var dis = (partialGrades.indexOf(g) !== -1) ? ' disabled' : '';
      h += '<button data-act="fbPick" data-i="' + bi + '" data-tok="' + tok + '"' + dis + '>' + g + '</button>';
    });
    var allPartial = [7, 8, 9, 10, 11, 12].every(function (g) { return partialGrades.indexOf(g) !== -1; });
    h += '<button data-act="fbPickAllPartial" data-i="' + bi + '"' + (allPartial ? ' disabled' : '') + '>전체</button>';
    h += '</div>';
    [[7, 8, 9], [10, 11, 12]].forEach(function (gset, ri) {
      h += '<div class="cl-picker-row"><span class="muted">' + (ri === 0 ? '학년-반' : '') + '</span>';
      gset.forEach(function (g) {
        ['A', 'B', 'C'].forEach(function (c) {
          var tok = g + c;
          var dis = (classes.indexOf(tok) !== -1) ? ' disabled' : '';
          h += '<button data-act="fbPick" data-i="' + bi + '" data-tok="' + tok + '"' + dis + '>' + tok + '</button>';
        });
      });
      h += '</div>';
    });
    h += '</div>';
  }

  h += '</div>';
  return h;
}

function fbPick(i, tok) {
  var b = DRAFT.fixedBlocks[i]; if (!b) return;
  b.grades = b.grades || []; b.partialGrades = b.partialGrades || []; b.classes = b.classes || [];
  function removeForms(g, keepClasses) {
    var gi = b.grades.indexOf(g); if (gi !== -1) b.grades.splice(gi, 1);
    var pi = b.partialGrades.indexOf(g); if (pi !== -1) b.partialGrades.splice(pi, 1);
    if (!keepClasses) b.classes = b.classes.filter(function (cl) { return parseInt(cl, 10) !== g; });
  }
  var mp = /^(\d+)일부$/.exec(tok);
  if (mp) { var gp = parseInt(mp[1], 10); removeForms(gp, false); if (b.partialGrades.indexOf(gp) === -1) b.partialGrades.push(gp); }
  else if (/^\d+$/.test(tok)) { var g = parseInt(tok, 10); removeForms(g, false); if (b.grades.indexOf(g) === -1) b.grades.push(g); }
  else { var gg = parseInt(tok, 10); removeForms(gg, true); if (b.classes.indexOf(tok) === -1) b.classes.push(tok); }
  SETTINGS_DIRTY = true;
  renderSettings();
}

function fbChipRemove(i, tok) {
  var b = DRAFT.fixedBlocks[i]; if (!b) return;
  var mp = /^(\d+)일부$/.exec(tok);
  if (mp) { var gp = parseInt(mp[1], 10); var pi = (b.partialGrades || []).indexOf(gp); if (pi !== -1) b.partialGrades.splice(pi, 1); }
  else if (/^\d+$/.test(tok)) { var g = parseInt(tok, 10); var gi = (b.grades || []).indexOf(g); if (gi !== -1) b.grades.splice(gi, 1); }
  else { var q = (b.classes || []).indexOf(tok); if (q !== -1) b.classes.splice(q, 1); }
  SETTINGS_DIRTY = true;
  renderSettings();
}

/* ── 연결 그룹 카드 헬퍼 ─────────────────────────────── */
function groupOfSubjectDraft(subj, exceptGi) {
  for (var i = 0; i < DRAFT.groups.length; i++) {
    if (i === exceptGi) continue;
    if (DRAFT.groups[i].subjects.indexOf(subj) !== -1) return { gi: i, name: DRAFT.groups[i].name };
  }
  return null;
}

function subjectSlotSet(subj) {
  var set = [];
  STATE.model.entries.forEach(function (e) {
    if (e.type !== 'teacher') return;
    for (var i = 0; i < SLOT_COUNT; i++) { if (e.slots[i] === subj && set.indexOf(i) === -1) set.push(i); }
  });
  set.sort(function (a, b) { return a - b; });
  return set;
}

function groupAlignHtml(g, gridSet) {
  var present = g.subjects.filter(function (s) { return gridSet[s]; });
  if (present.length < 2) return '';
  var sets = {};
  present.forEach(function (s) { sets[s] = subjectSlotSet(s); });
  var inter = sets[present[0]].filter(function (idx) {
    return present.every(function (s) { return sets[s].indexOf(idx) !== -1; });
  });
  var mism = [];
  present.forEach(function (s) {
    sets[s].forEach(function (idx) {
      if (inter.indexOf(idx) === -1) mism.push(esc(s) + '에만 있는 교시 ' + slotLabel(idx));
    });
  });
  if (!mism.length) return '<div class="grp-align ok">✓ 동일 교시 정렬됨 (주 ' + inter.length + '회)</div>';
  return '<div class="grp-align bad">⚠ 교시 불일치: ' + mism.slice(0, 2).join(', ') + '</div>';
}

function pickListHtml(gi) {
  var g = DRAFT.groups[gi];
  var q = (GROUP_UI.q[gi] || '').trim().toLowerCase();
  var inGroup = {}; g.subjects.forEach(function (s) { inGroup[s] = true; });
  var all = subjectsInGrid().filter(function (s) { return !inGroup[s]; });
  var filtered = q ? all.filter(function (s) { return s.toLowerCase().indexOf(q) !== -1; }) : all;
  if (!filtered.length) return '<div class="muted">일치하는 과목이 없습니다.</div>';
  var shown = filtered.slice(0, 8);
  var h = shown.map(function (s) {
    var other = groupOfSubjectDraft(s, gi);
    var badge = other ? '<span class="grp-badge">' + esc(other.name) + '</span>' : '';
    return '<div class="pick-item" data-act="addPick" data-i="' + gi + '" data-subj="' + esc(s) + '">' + esc(s) + badge + '</div>';
  }).join('');
  if (filtered.length > 8) h += '<div class="muted">더 입력해 좁히세요 (' + filtered.length + '개 중 8개 표시)</div>';
  return h;
}

function groupCardHtml(g, gi, gridSet, nameCount) {
  var dupName = (g.name || '').trim() && nameCount[(g.name || '').trim()] > 1;
  var h = '<div class="grp-row" data-gcard="' + gi + '">';
  // 1행: 그룹명 + 과목 수 + 보기 + 삭제
  h += '<div class="row"><input type="text" data-f="gname" data-i="' + gi + '" value="' + esc(g.name) + '" placeholder="그룹명">' +
    '<span class="muted">과목 ' + g.subjects.length + '개</span>' +
    '<button data-act="grpView" data-i="' + gi + '" style="margin-left:auto">그리드에서 보기</button>' +
    '<button data-act="delGroup" data-i="' + gi + '">삭제</button></div>';
  // 2행: 칩
  h += '<div class="row">';
  if (!g.subjects.length) h += '<span class="muted">선택된 과목 없음</span>';
  g.subjects.forEach(function (subj) {
    var missing = !gridSet[subj];
    var title = missing ? ' title="현재 시간표에 없는 과목"' : '';
    var pin = pinnedSlotsOf(subj) ? '<span title="고정 수업">📌</span>' : '';
    h += '<span class="chip' + (missing ? ' chip-missing' : '') + '"' + title + '>' + esc(subj) + pin +
      '<button class="chip-x" data-act="chipRemove" data-i="' + gi + '" data-subj="' + esc(subj) + '">×</button></span>';
  });
  h += '</div>';
  // 유효성
  if (g.subjects.length < 2) h += '<div class="warn">⚠ 과목이 2개 이상이어야 그룹으로 동작합니다</div>';
  if (dupName) h += '<div class="warn">⚠ 그룹명이 다른 그룹과 중복됩니다</div>';
  // 슬롯 정렬 요약
  h += groupAlignHtml(g, gridSet);
  // 3행: 과목 추가
  h += '<div class="row"><button data-act="addOpen" data-i="' + gi + '">+ 과목 추가</button></div>';
  if (GROUP_UI.open[gi]) {
    h += '<div class="pick-panel"><input type="text" data-f="gsearch" data-i="' + gi + '" value="' + esc(GROUP_UI.q[gi] || '') + '" placeholder="과목 검색">' +
      '<div class="pick-list">' + pickListHtml(gi) + '</div></div>';
  }
  h += '</div>';
  return h;
}

function renderGroupPicks(gi) {
  var card = document.querySelector('#settingsBody [data-gcard="' + gi + '"]');
  if (!card) return;
  var pl = card.querySelector('.pick-list');
  if (pl) pl.innerHTML = pickListHtml(gi);
}

function addPick(gi, subj) {
  if (!subj) return;
  var g = DRAFT.groups[gi]; if (!g) return;
  if (g.subjects.indexOf(subj) !== -1) return;
  var other = groupOfSubjectDraft(subj, gi);
  if (other) {
    if (!confirm("이미 '" + other.name + "' 그룹에 있습니다. 이 그룹으로 옮길까요?")) return;
    var arr = DRAFT.groups[other.gi].subjects;
    var p = arr.indexOf(subj); if (p !== -1) arr.splice(p, 1);
  }
  g.subjects.push(subj);
  SETTINGS_DIRTY = true;
  renderSettings();
}

function chipRemove(gi, subj) {
  var g = DRAFT.groups[gi]; if (!g) return;
  var p = g.subjects.indexOf(subj); if (p !== -1) g.subjects.splice(p, 1);
  SETTINGS_DIRTY = true;
  renderSettings();
}

function teamSubjectSlots(name, subj) {
  var set = [];
  STATE.model.entries.forEach(function (e) {
    if (e.type !== 'teacher' || e.name !== name) return;
    for (var i = 0; i < SLOT_COUNT; i++) { if (e.slots[i] === subj && set.indexOf(i) === -1) set.push(i); }
  });
  set.sort(function (a, b) { return a - b; });
  return set;
}

function teamAlignHtml(t, gridSet) {
  var subj = (t.subject || '').trim();
  if (!subj || !gridSet[subj] || t.teachers.length < 2) return '';
  var sets = {}, missing = [];
  t.teachers.forEach(function (nm) {
    var s = teamSubjectSlots(nm, subj);
    sets[nm] = s;
    if (!s.length) missing.push(nm);
  });
  var msgs = [];
  missing.forEach(function (nm) { msgs.push('불일치: ' + esc(nm) + ' 행에 이 과목 없음'); });
  var present = t.teachers.filter(function (nm) { return sets[nm].length; });
  if (present.length >= 2) {
    var inter = sets[present[0]].filter(function (idx) {
      return present.every(function (nm) { return sets[nm].indexOf(idx) !== -1; });

          if (st === 'partial') return c + ' 일부';
          return c + ': ' + (r.cover[c] || []).join('/');
        }).join(' · ');
        if (bd.gradeSups && bd.gradeSups.length) ttl += (ttl ? ' · ' : '') + g + '일부 감독: ' + bd.gradeSups.join(', ');
      }
      if (bd.pure.length) ttl += (ttl ? ' · ' : '') + '감독: ' + bd.pure.join(', ');
      var clickable = (r.kind === 'all' || r.kind === 'some' || r.kind === 'partial');

var GF_SUBJ_MAX = 4;   // 칸에 직접 보여줄 과목 수 — 넘치면 '+N'(전체는 툴팁)
function gradeFreeCellHtml(g, dd, p, cfg, blocks, paint, subjects) {
  var r = gradeFreeState(STATE.model, cfg, g, { day: dd, period: p });
  var bd = raSupBreakdownAt(dd * 8 + (p - 1), g);
  var bst = ghState(blocks, dd, p, g);           // '불가' | '일부' | '가능'

  if (bst !== '가능') {

  }
  var cls = 'gf-cell ';
  cls += (r.kind === 'blocked' ? 'gf-blocked'
    : r.kind === 'all' ? 'gf-all' : r.kind === 'some' ? 'gf-some' : r.kind === 'partial' ? 'gf-part' : 'gf-none');
  // 이름이 있으면 회색 블록(학교 행사처럼 이미 정해진 시간), 없으면 사선 무늬
  if (bst === '불가') cls += blkLabel ? ' gf-nogo gf-named' : ' gf-nogo';
  else if (bst === '일부') cls += ' gf-pblock';
  if (r.covered) cls += ' gf-ra';

  // 본문: 금지 슬롯이면 금지 표기를 우선(라벨 있으면 라벨), 아니면 공강 라벨
  var text;
  if (bst === '불가') text = blkLabel || '금지';
  else if (r.kind === 'blocked') text = r.label || '금지';
  else text = (r.covered ? '✓ ' : '') + raFreeCellLabel(r, { byClass: bd.byClass, gradeSups: bd.gradeSups }, g);

  // 툴팁: 상태 설명 + 이 모드에서 클릭하면 무슨 일이 일어나는지
  var t = [];
  if (r.kind === 'blocked') t.push('배정 금지(공강 아님)');
  else {
    t.push([g + 'A', g + 'B', g + 'C'].map(function (c) {
      var st = r.classes[c];
      if (st === 'free') { var _sn = bd.byClass[c]; return c + ' 공강' + (_sn.length ? ' (감독: ' + _sn.join(', ') + ')' : ''); }
      if (st === 'partial') return c + ' 일부';
      return c + ': ' + (r.cover[c] || []).join('/');
    }).join(' · '));
  }
  if (bst === '불가') t.push('금지 슬롯' + (blkLabel ? '(' + blkLabel + ')' : ''));
  else if (bst === '일부') {
    var rp = blocks.find(function (b) { return b.day === dd && b.period === p; });
    if (rp && (rp.partialGrades || []).indexOf(g) !== -1) t.push('부분 금지: 학년 일부(정규 금지)');
    else {
      var cs = ghPartClasses(blocks, dd, p, g);
      if (cs.length) t.push('부분 금지: ' + cs.join(', '));
    }
  }
  if (bd.pure.length) t.push('감독: ' + bd.pure.join(', '));
  if (bd.gradeSups && bd.gradeSups.length) t.push(g + '일부 감독: ' + bd.gradeSups.join(', '));
  var subjs = subjects || [];
  if (subjs.length) t.push('편성 과목: ' + subjs.join(' / '));   // 접힌 과목도 툴팁에는 전부
  t.push(gfClickHint(r, bst, paint));

  // 본문 = 상태 줄 + 과목 줄. 칠하기 모드에서는 과목을 빼서 칠할 칸 판독을 방해하지 않는다.
  var body = text ? '<div class="gf-st">' + esc(text).replace(/\n/g, '<br>') + '</div>' : '';
  if (!paint && subjs.length) {
    var shown = subjs.slice(0, GF_SUBJ_MAX);
    body += '<div class="gf-subj' + (text ? '' : ' gf-subj-only') + '">'
      + shown.map(function (s) { return '<span>' + esc(s) + '</span>'; }).join('')
      + (subjs.length > shown.length ? '<span class="gf-more">+' + (subjs.length - shown.length) + '</span>' : '')
      + '</div>';
  }
  return '<td class="' + cls + '" data-day="' + dd + '" data-period="' + p + '" title="' + esc(t.join(' · ')) + '">'
    + body + '</td>';
}
// "이 칸을 클릭하면 무슨 일이 일어나는가" — 모드가 주동작을 결정한다.
