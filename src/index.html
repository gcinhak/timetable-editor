/* =========================================================
   RA 감독 배정 — 공강 셀 클릭 → 후보 배정/해제 (POST /api/apply)
   ========================================================= */
var RA_UI = null; // { day, period, grade, idx, selCls, perClass }

var RA_VALUE_RE = /^RA(?:(7|8|9|10|11|12)([A-C])?)?$/;
function isRaValue(v) { return RA_VALUE_RE.test(String(v == null ? '' : v).trim()); }

// state.js assignCandidates 인라인 미러 (백엔드와 동일 동작 보장)
function assignCandidates(model, config, idx) {
  var unavail = (config && config.unavailable) || [];
  function isUnavail(entry) {
    for (var i = 0; i < unavail.length; i++) {
      var u = unavail[i];
      if (u.name !== entry.name) continue;
      if (u.row != null && u.row !== entry.row) continue;
      if (u.slots && u.slots.indexOf(idx) !== -1) return true;
    }
    return false;
  }
  var out = [];
  ((model && model.entries) || []).forEach(function (e) {
    if (e.type !== 'teacher') return;
    var cur = e.slots[idx];
    if (cur != null && String(cur).trim() !== '') return;
    if (isUnavail(e)) return;
    var total = 0, ra = 0;
    for (var i = 0; i < e.slots.length; i++) {
      var v = e.slots[i];
      if (v == null || String(v).trim() === '') continue;
      total++;
      if (isRaValue(v)) ra++;
    }
    out.push({ name: e.name, row: e.row, lessons: total - ra, ra: ra, total: total });
  });
  out.sort(function (a, b) { return a.total - b.total || (a.name < b.name ? -1 : a.name > b.name ? 1 : 0); });
  return out;
}

// 슬롯의 반별 RA 감독('RA'+반), 학년 단위 RA 감독('RA'+학년, 일부) 및 순수 'RA'(legacy) 감독 이름
function raSupBreakdownAt(idx, g) {
  var order = [g + 'A', g + 'B', g + 'C'];
  var byClass = {}; order.forEach(function (c) { byClass[c] = []; });
  var gradeSups = [], pure = [];
  ((STATE.model && STATE.model.entries) || []).forEach(function (e) {
    if (e.type !== 'teacher') return;
    var v = String(e.slots[idx] == null ? '' : e.slots[idx]).trim();
    if (v === 'RA') { pure.push(e.name); return; }
    if (v === 'RA' + g) { gradeSups.push(e.name); return; }
    order.forEach(function (c) { if (v === 'RA' + c) byClass[c].push(e.name); });
  });
  return { byClass: byClass, gradeSups: gradeSups, pure: pure };
}

function isRaAssignOpen() { return document.getElementById('raAssign').classList.contains('open'); }

function openRaAssign(day, period, grade) {
  RA_UI = { day: day, period: period, grade: grade, idx: day * 8 + (period - 1) };
  renderRaAssign();
  document.getElementById('backdrop').classList.add('on');
  document.getElementById('raAssign').classList.add('open');
}

function closeRaAssign() {
  document.getElementById('raAssign').classList.remove('open');
  if (!isSettingsOpen()) document.getElementById('backdrop').classList.remove('on');
}

// 후보 목록(시수 표시) HTML — 반/일부 모드 공용
function raCandsHtml(idx) {
  var cands = assignCandidates(STATE.model, STATE.config, idx);
  var html = '<div class="ra-sec"><b>후보</b><div class="ra-cands">';
  if (cands.length) {
    cands.forEach(function (c) {
      html += '<div class="ra-cand" data-row="' + c.row + '">' + esc(c.name)
        + '<span class="ra-meta">수업 ' + c.lessons + ' · RA ' + c.ra + '</span></div>';
    });
  } else { html += '<div class="muted" style="padding:8px 10px">배정 가능한 교사가 없습니다</div>'; }
  html += '</div></div>';
  return html;
}

function renderRaAssign() {
  if (!RA_UI) return;
  var idx = RA_UI.idx, g = RA_UI.grade;
  document.getElementById('raAssignTitle').textContent = slotLabel(idx) + ' · ' + g + '학년';
  var html = '';
  var gf = gradeFreeState(STATE.model, STATE.config, g, { day: RA_UI.day, period: RA_UI.period });
  var order = [g + 'A', g + 'B', g + 'C'];
  // 반별 감독('RA'+반) 매핑
  var supByClass = {};
  ((STATE.model && STATE.model.entries) || []).forEach(function (e) {
    if (e.type !== 'teacher') return;
    var v = String(e.slots[idx] == null ? '' : e.slots[idx]).trim();
    order.forEach(function (c) { if (v === 'RA' + c) supByClass[c] = e; });
  });
  // 표시할 반 = 현재 공강 반 ∪ 이미 RA배정된 반
  var showClasses = order.filter(function (c) { return (gf.freeClasses.indexOf(c) !== -1) || supByClass[c]; });

  if (showClasses.length > 0) {
    // ── 반 단위 모드 ──
    RA_UI.perClass = true;
    // 선택 반 보정: 미배정 반 우선, 없으면 첫 반
    if (showClasses.indexOf(RA_UI.selCls) === -1) {
      var firstFree = showClasses.filter(function (c) { return !supByClass[c]; })[0];
      RA_UI.selCls = firstFree || showClasses[0];
    }
    html += '<div class="ra-sec"><b>반 선택</b>';
    showClasses.forEach(function (c) {
      var sup = supByClass[c];
      var lab = sup ? esc(sup.name) : '미배정';
      var clr = sup ? '<button class="ra-clear" type="button" data-row="' + sup.row + '" title="해제">✕</button>' : '';
      html += '<button class="ra-classtab' + (c === RA_UI.selCls ? ' sel' : '') + '" type="button" data-cls="' + c + '">'
        + esc(c) + ' · ' + lab + clr + '</button>';
    });
    html += '</div>';
    html += raCandsHtml(idx);
  } else if (gf.kind === 'partial' || gf.partialClasses.length) {
    // ── 부분/단일 모드(기존 동작) ──
    RA_UI.perClass = false;
    html += '<div class="ra-sec"><b>공강 반</b>' + esc(gf.partialClasses.length ? (RA_UI.grade + '일부') : '없음') + '</div>';
    var sup = [];
    ((STATE.model && STATE.model.entries) || []).forEach(function (e) {
      if (e.type !== 'teacher') return;
      var v = String(e.slots[idx] == null ? '' : e.slots[idx]).trim();
      if (v === ('RA' + RA_UI.grade) || v === 'RA') sup.push(e);
    });
    html += '<div class="ra-sec"><b>현재 배정</b>';
    if (sup.length) {
      html += sup.map(function (e) {
        return '<span class="ra-chip">' + esc(e.name) + '<button class="ra-clear" type="button" data-row="' + e.row + '" title="해제">✕</button></span>';
      }).join('');
    } else { html += '<span class="muted">없음</span>'; }
    html += '</div>';
    html += raCandsHtml(idx);
  } else {
    // ── 배정 가능한 반 없음 ──
    RA_UI.perClass = false;
    html += '<div class="ra-sec"><span class="muted">배정 가능한 반이 없습니다</span></div>';
  }
  document.getElementById('raAssignBody').innerHTML = html;
}

function onRaAssignBodyClick(ev) {
  var t = ev.target;
  var clr = t.closest ? t.closest('.ra-clear') : null;
  if (clr) { raClearCell(+clr.dataset.row, RA_UI.idx); return; }
  var tab = t.closest ? t.closest('.ra-classtab') : null;
  if (tab) { RA_UI.selCls = tab.dataset.cls; renderRaAssign(); return; }
  var cand = t.closest ? t.closest('.ra-cand') : null;
  if (cand) {
    var value = RA_UI.perClass ? ('RA' + RA_UI.selCls) : ('RA' + RA_UI.grade);
    raAssignCell(+cand.dataset.row, RA_UI.idx, value);
    return;
  }
}

// RA 배정/해제 공용 네트워크 op — confirmPlan 성공 경로를 그대로 미러
function raApplyOp(kind, ops, undoEntry, successMsg) {
  show('loading', true, 'flex');
  var body = { sheetId: STATE.sheetId, tab: STATE.tab, baseVersion: STATE.version, kind: kind };
  if (ops.assigns) body.assigns = ops.assigns;
  if (ops.clears) body.clears = ops.clears;
  apiCall('/api/apply', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).then(function (r) {
    show('loading', false);
    if (r.status === 409 && r.data && r.data.error === 'stale') {
      var reasons0 = (r.data && r.data.reasons) || ['시트가 변경되었습니다.'];
      alert(reasons0.join('\n'));
      loadState(STATE.sheetId, STATE.tab);
      return;
    }
    if (r.status === 409 || r.status === 400) {
      var reasons = (r.data && r.data.reasons) || [(r.data && r.data.error) || '적용할 수 없습니다.'];
      toast(reasons[0]);
      return;
    }
    if (!r.data || !r.data.ok) { toast('적용 실패: ' + (r.data && r.data.error || r.status)); return; }
    STATE.grid = r.data.grid;
    STATE.version = r.data.version;
    if (r.data.configVersion != null) STATE.configVersion = r.data.configVersion;
    STATE.tab = r.data.tab;
    STATE.config = r.data.config;
    STATE.dataStart = r.data.dataStart || STATE.dataStart;
    STATE.model = buildModel(STATE.grid.slice(STATE.dataStart - 1), STATE.dataStart);
    if (undoEntry) STATE.undoStack.push(undoEntry);
    updateUndoButton();
    renderGrid();
    updateToolbarNote();
    renderGradeFreeIfOpen();
    if (isRaAssignOpen()) renderRaAssign();
    if (successMsg) toast(successMsg);
  }).catch(function (err) {
    show('loading', false);
    if (err && (err.auth || err.sheetsAccess)) { handleErr(err); return; }
    toast('적용 실패: ' + (err && err.message || err));
  });
}

function raAssignCell(row, idx, value) {

  var nm = e ? e.name : '';

  raApplyOp('assign', { assigns: [{ row: row, idx: idx, value: val }] },

function raClearCell(row, idx) {

  raApplyOp('unassign', { clears: [{ row: row, idx: idx }] },

/* =========================================================
   금지 슬롯 칠하기 (학년별 시간표 탭 · DRAFT 편집 → [저장])
   — 클릭/드래그 중에는 미리보기만, 마우스를 놓을 때 DRAFT 를 딱 1회 갱신한다.
   ========================================================= */
function gfPaintable(ev) {
  if (!isGradeFreeOpen() || GF_UI.mode !== 'paint') return null;
  return (ev.target.closest && ev.target.closest('#gradeFreeBody td.gf-cell')) || null;
}
function gfPaintStart(ev) {
  if (ev.button !== 0) return;
  var td = gfPaintable(ev);
  if (!td) return;
  ev.preventDefault(); // 텍스트 선택 방지
  var day = parseInt(td.getAttribute('data-day'), 10);
  var period = parseInt(td.getAttribute('data-period'), 10);
  var st = ghState(gfBlocks(), day, period, GF_UI.grade);
  GF_PAINT = { action: (st === '불가') ? 'ERASE' : 'PAINT', cells: {} };
  gfPaintAdd(td, day, period);
}
function gfPaintAdd(td, day, period) {
  var key = day + '_' + period;
  if (GF_PAINT.cells[key]) return;
  GF_PAINT.cells[key] = { day: day, period: period };
  td.classList.add(GF_PAINT.action === 'PAINT' ? 'gf-paint-on' : 'gf-paint-off');
}
function gfPaintOver(ev) {
  if (!GF_PAINT) return;
  var td = gfPaintable(ev);
  if (!td) return;
  gfPaintAdd(td, parseInt(td.getAttribute('data-day'), 10), parseInt(td.getAttribute('data-period'), 10));
}
// 매트릭스 밖으로 나가면 드래그 종료 + 적용
function gfPaintLeave(ev) {
  if (!GF_PAINT) return;
  var to = ev.relatedTarget;
  if (to && to.closest && to.closest('table.gh-matrix')) return;
  gfPaintEnd();
}
function gfPaintEnd() {
  if (!GF_PAINT) return;
  var d = GF_PAINT; GF_PAINT = null;
  var g = GF_UI.grade;
  var blocks = gfBlocks();
  var n = 0;
  Object.keys(d.cells).forEach(function (k) {
    var c = d.cells[k];
    var st = ghState(blocks, c.day, c.period, g);
    if (d.action === 'PAINT') { if (st !== '불가') { ghToggle(blocks, c.day, c.period, g); n++; } }
    else { if (st === '불가') { ghToggle(blocks, c.day, c.period, g); n++; } }
  });
  if (!n) { renderGradeFree(); return; }   // 바뀐 게 없으면 미리보기만 지운다
  gfCommitBlocks(n, d.action);
}
// 머리글(요일/교시) 일괄 전환 — 8칸·5칸을 한 번에 바꾸므로 확인을 받는다.
function gfBulkToggle(kind, val) {
  var g = GF_UI.grade;
  var blocks = gfBlocks();
  var cells = [];
  if (kind === 'day') { for (var p = 1; p <= 8; p++) cells.push({ day: val, period: p }); }
  else { for (var dd = 0; dd < 5; dd++) cells.push({ day: dd, period: val }); }
  var anyOpen = cells.some(function (c) { return ghState(blocks, c.day, c.period, g) !== '불가'; });
  var label = (kind === 'day' ? DAYS[val] + '요일' : val + '교시');
  var n = cells.filter(function (c) {
    var st = ghState(blocks, c.day, c.period, g);
    return anyOpen ? st !== '불가' : st === '불가';
  }).length;
  if (!n) return;
  if (!confirm(g + '학년 ' + label + ' ' + n + '칸을 ' + (anyOpen ? '금지로 지정' : '금지 해제') + '할까요?\n[저장]을 눌러야 반영됩니다.')) return;
  cells.forEach(function (c) {
    var st = ghState(blocks, c.day, c.period, g);
    if (anyOpen ? st !== '불가' : st === '불가') ghToggle(blocks, c.day, c.period, g);
  });
  gfCommitBlocks(n, anyOpen ? 'PAINT' : 'ERASE');
}
// 한 번의 사용자 조작 = DRAFT 1회 갱신. 다른 설정 탭과 똑같이 [저장] 때 시트에 쓰인다.
// ghToggle 이 DRAFT.fixedBlocks 를 제자리에서 고쳤으므로 여기서는 dirty 표시 + 재렌더만 한다.

  SETTINGS_DIRTY = true;
  renderSettings();   // 금지 슬롯 탭의 규칙 목록도 함께 최신화
  toast('금지 슬롯 ' + n + '칸을 ' + (action === 'PAINT' ? '지정' : '해제') + '했습니다 — [저장]을 눌러야 반영됩니다');
}

  Object.keys(UV_UI.open).forEach(function (k) { if (+k >= DRAFT.unavailable.length) delete UV_UI.open[k]; });
  Object.keys(UV_UI.q).forEach(function (k) { if (+k >= DRAFT.unavailable.length) delete UV_UI.q[k]; });
  html += '<div class="sec" data-tab="unavail"><h3>불가 시간 <span class="muted h-help">교사별 수업 불가 시간입니다. 툴바의 \'불가 시간 등록\' 모드에서 셀을 클릭하거나 아래 카드로 지정합니다.</span></h3>';
  html += '<div class="row"><button data-act="uvAdd">+ 교사 추가</button></div>';
  if (!DRAFT.unavailable.length) html += '<div class="muted">등록된 불가 시간이 없습니다.</div>';
  DRAFT.unavailable.forEach(function (u, ui) { html += uvCardHtml(u, ui, teacherSet); });
  html += '</div>';

  // 고정 수업 (수동 설정)
  Object.keys(PN_UI.open).forEach(function (k) { if (+k >= DRAFT.pinned.length) delete PN_UI.open[k]; });
  html += '<div class="sec" data-tab="pinned"><h3>고정 수업 <span class="muted h-help">고정된 수업은 지정 교시에서 이동할 수 없습니다. 저장하면 설정 탭에 기록되어 연결그룹 탭 값보다 우선합니다.</span></h3>';
  if (STATE.config && STATE.config.pinnedSource === 'linked') {
    html += '<div class="warn">연결그룹 탭에서 파생된 값입니다 — 저장하면 설정으로 굳어집니다.</div>';
  }
  html += '<datalist id="pinnedSubjects">' + subs.map(function (s) { return '<option value="' + esc(s) + '">'; }).join('') + '</datalist>';
  html += '<div class="row"><button data-act="pinAdd">+ 과목 추가</button>' +
    '<button data-act="pinImport">연결그룹 탭에서 가져오기</button></div>';
  if (!DRAFT.pinned.length) html += '<div class="muted">등록된 고정 수업이 없습니다.</div>';
  DRAFT.pinned.forEach(function (pc, ci) { html += pinnedCardHtml(pc, ci, gridSet); });
  html += '</div>';

  // 학년별 시간표 (다른 탭과 같은 DRAFT + [저장] 방식. 내용은 renderGradeFree 가 채운다)
  html += '<div class="sec" data-tab="gradefree"><h3>학년별 시간표 <span class="muted h-help">학년별 공강·금지 슬롯·RA 감독을 한 장에서 봅니다. 금지 슬롯 칠하기로 편집한 내용은 [저장]을 눌러야 반영됩니다. RA 감독 배정은 메인 그리드에서 합니다.</span></h3>';
  html += '<div id="gradeFreeNote" class="muted"></div>';
  html += '<div id="gradeFreeMode"></div>';
  html += '<div id="gradeFreeGrades" style="margin:8px 0"></div>';
  html += '<div id="gradeFreeBody"></div>';
  html += '<div id="gradeFreeLegend"></div>';
  html += '</div>';

  var _sbody = document.getElementById('settingsBody');
  var _sTop = _sbody.scrollTop;
  _sbody.innerHTML = html;
  _sbody.scrollTop = _sTop; // 재렌더 후 스크롤 위치 유지
  applySettingsTab();
  renderGradeFreeIfOpen();
}

function onSettingsClick(ev) {
  var el = ev.target.closest('[data-act]');
  if (!el) return;
  var act = el.getAttribute('data-act');
  var i = parseInt(el.getAttribute('data-i'), 10);
  // 데이터 변경이 아닌 상호작용
  if (act === 'grpView') { grpPeek(i); return; }
  if (act === 'addOpen') { GROUP_UI.open[i] = !GROUP_UI.open[i]; renderSettings(); return; }
  if (act === 'addPick') { addPick(i, el.getAttribute('data-subj')); return; }
  if (act === 'chipRemove') { chipRemove(i, el.getAttribute('data-subj')); return; }
  if (act === 'addTeamOpen') { TEAM_UI.open[i] = !TEAM_UI.open[i]; renderSettings(); return; }
  if (act === 'addTeamPick') { teamAddPick(i, el.getAttribute('data-name')); return; }
  if (act === 'teamChipRemove') { teamChipRemove(i, el.getAttribute('data-name')); return; }
  if (act === 'pinAddOpen') { PN_UI.open[i] = !PN_UI.open[i]; renderSettings(); return; }
  if (act === 'pinPick') { pinAddSlot(i, parseInt(el.getAttribute('data-idx'), 10)); return; }
  if (act === 'pinChipRemove') { pinRemoveSlot(i, parseInt(el.getAttribute('data-idx'), 10)); return; }
  if (act === 'clOpen') { classlessOpen(el.getAttribute('data-subj')); return; }
  if (act === 'clPick') { classlessAdd(el.getAttribute('data-subj'), el.getAttribute('data-tok')); return; }
  if (act === 'clChipRemove') { classlessChipRemove(el.getAttribute('data-subj'), el.getAttribute('data-tok')); return; }
  if (act === 'clNone') { classlessNone(el.getAttribute('data-subj')); return; }
  if (act === 'fbOpen') { FB_UI.open[i] = !FB_UI.open[i]; renderSettings(); return; }
  if (act === 'fbPick') { fbPick(i, el.getAttribute('data-tok')); return; }
  if (act === 'fbPickAllGrades') { [7, 8, 9, 10, 11, 12].forEach(function (g) { fbPick(i, String(g)); }); return; }
  if (act === 'fbPickAllPartial') { [7, 8, 9, 10, 11, 12].forEach(function (g) { fbPick(i, g + '일부'); }); return; }
  if (act === 'fbChipRemove') { fbChipRemove(i, el.getAttribute('data-tok')); return; }
  if (act === 'uvAddOpen') { UV_UI.open[i] = !UV_UI.open[i]; renderSettings(); return; }
  if (act === 'uvPick') { uvPick(i, el.getAttribute('data-name'), el.getAttribute('data-row')); return; }
  if (act === 'uvSlotPick') { uvToggleSlot(i, parseInt(el.getAttribute('data-idx'), 10)); return; }
  if (act === 'uvClearName') { uvClearName(i); return; }
  SETTINGS_DIRTY = true;
  if (act === 'delBlock') { DRAFT.fixedBlocks.splice(i, 1); renderSettings(); }
  else if (act === 'addBlock') {
    DRAFT.fixedBlocks.push({ day: 0, period: 1, label: '', grades: [], partialGrades: [], classes: [] });
    var newIndex = DRAFT.fixedBlocks.length - 1;
    renderSettings();
    var nc = document.querySelector('#settingsBody .blk-row [data-act="delBlock"][data-i="' + newIndex + '"]');
    if (nc) nc.closest('.blk-row').scrollIntoView({ block: 'nearest' });
  }
  else if (act === 'addGroup') { DRAFT.groups.push({ name: '새 그룹', subjects: [] }); renderSettings(); }
  else if (act === 'delGroup') { DRAFT.groups.splice(i, 1); renderSettings(); }
  else if (act === 'importElectives') { importElectives(); }
  else if (act === 'addTeam') { DRAFT.team.push({ subject: '', teachers: [] }); renderSettings(); }
  else if (act === 'delTeam') { DRAFT.team.splice(i, 1); renderSettings(); }
  else if (act === 'uvAdd') { DRAFT.unavailable.push({ name: '', slots: [] }); renderSettings(); }
  else if (act === 'delUnavail') { DRAFT.unavailable.splice(i, 1); renderSettings(); }
  else if (act === 'pinAdd') { DRAFT.pinned.push({ subject: '', slots: [] }); renderSettings(); }
  else if (act === 'pinDel') { DRAFT.pinned.splice(i, 1); renderSettings(); }
  else if (act === 'pinImport') {
    if (confirm('연결그룹 탭의 고정수업 값으로 대체할까요? 현재 편집 중인 목록은 사라집니다.')) {
      var lp = STATE.linkedPinned || {};
      DRAFT.pinned = Object.keys(lp).map(function (k) { return { subject: k, slots: (lp[k] || []).slice() }; });
      renderSettings();
    }
  }
}

function onSettingsInput(ev) {
  var el = ev.target;
  var f = el.getAttribute('data-f');
  var i = parseInt(el.getAttribute('data-i'), 10);
  // 라벨/그룹명은 재렌더 없이 DRAFT만 갱신 → 입력 포커스 유지
  if (f === 'gname') { DRAFT.groups[i].name = el.value; SETTINGS_DIRTY = true; }
  else if (f === 'gsearch') { GROUP_UI.q[i] = el.value; renderGroupPicks(i); }
  else if (f === 'blabel') { DRAFT.fixedBlocks[i].label = el.value; SETTINGS_DIRTY = true; }
  else if (f === 'tsubj') { DRAFT.team[i].subject = el.value; SETTINGS_DIRTY = true; }
  else if (f === 'psubj') { DRAFT.pinned[i].subject = el.value; SETTINGS_DIRTY = true; }
  else if (f === 'tsearch') { TEAM_UI.q[i] = el.value; renderTeamPicks(i); }
  else if (f === 'uvsearch') { UV_UI.q[i] = el.value; renderUvPicks(i); }
  else if (f === 'clsearch') { CL_UI.q = el.value; renderClasslessList(); }
}

function onSettingsChange(ev) {
  var el = ev.target;
  var f = el.getAttribute('data-f');
  if (!f) return;
  SETTINGS_DIRTY = true;
  var i = parseInt(el.getAttribute('data-i'), 10);
  if (f === 'clfilter') { CL_UI.unclassifiedOnly = el.checked; renderClasslessList(); }
  else if (f === 'bday') { DRAFT.fixedBlocks[i].day = parseInt(el.value, 10); renderSettings(); }
  else if (f === 'bperiod') { DRAFT.fixedBlocks[i].period = parseInt(el.value, 10); renderSettings(); }
}

function importElectives() {
  var el = STATE.electives || {};
  var codes = Object.keys(el).filter(function (code) { return (el[code] || []).length; });
  var overwrite = codes.filter(function (code) {
    return DRAFT.groups.some(function (g) { return g.name === code; });
  });
  var msg = '시트의 선택과목 그룹 ' + codes.length + '개를 일괄 적용할까요?';
  if (overwrite.length) msg += '\n기존 그룹 ' + overwrite.length + '개(' + overwrite.join(', ') + ')는 시트 기준으로 덮어씁니다.';
  if (!confirm(msg)) return;
  var added = 0, updated = 0;
  codes.forEach(function (code) {
    var subs = el[code];
    var existing = DRAFT.groups.find(function (g) { return g.name === code; });
    if (existing) { existing.subjects = subs.slice(); updated++; }
    else { DRAFT.groups.push({ name: code, subjects: subs.slice() }); added++; }
  });
  if (added || updated) SETTINGS_DIRTY = true;
  renderSettings();
  toast('그룹 ' + added + '개 추가, ' + updated + '개 갱신');
}

// 편집용 fixedBlocks → 저장 형태(grades: 'all' 축약, 빈 규칙 제거).
// assembleConfig([저장] 경로)과 학년별 시간표 탭의 미리보기가 공유한다.
function blocksToConfig(list) {
  var blocks = [];
  (list || []).forEach(function (b) {
    var gArr = (b.grades === 'all') ? [7, 8, 9, 10, 11, 12] : (b.grades || []).slice();
    var isAll = [7, 8, 9, 10, 11, 12].every(function (g) { return gArr.indexOf(g) !== -1; });
    var partialGrades = (b.partialGrades || []).slice().filter(function (g) { return isAll ? false : gArr.indexOf(g) === -1; });
    var grades, classes;
    if (isAll) { grades = 'all'; classes = []; }
    else {
      grades = gArr;
      // 학년 전체가 선택되면 그 학년의 개별 반은 생략(grades 우선)
      classes = (b.classes || []).filter(function (cl) { var n = parseInt(cl, 10); return grades.indexOf(n) === -1 && partialGrades.indexOf(n) === -1; });
    }
    var label = (b.label || '').trim();
    var hasTarget = (grades === 'all') || grades.length || partialGrades.length || classes.length;
    if (!hasTarget && !label) return; // 대상·라벨 모두 비면 제외
    blocks.push({ day: b.day, period: b.period, label: label, grades: grades, classes: classes, partialGrades: partialGrades });
  });
  return blocks;
}

function assembleConfig() {
  var blocks = blocksToConfig(DRAFT.fixedBlocks);
  var config = { fixedBlocks: blocks, linkedGroups: {}, classless: {}, teamTeaching: {} };
  DRAFT.groups.forEach(function (g) {
    var n = (g.name || '').trim();
    if (n && g.subjects.length) config.linkedGroups[n] = g.subjects.slice();
  });
  Object.keys(DRAFT.classless).forEach(function (k) { config.classless[k] = DRAFT.classless[k].slice(); });
  DRAFT.team.forEach(function (t) {
    if (t.subject && t.teachers.length) config.teamTeaching[t.subject] = t.teachers.slice();
  });
  config.unavailable = (DRAFT.unavailable || []).map(function (u) { var o = { name: u.name, slots: (u.slots || []).slice() }; if (u.row != null) o.row = u.row; return o; });
  config.pinnedManual = {};
  (DRAFT.pinned || []).forEach(function (pc) {
    var subj = (pc.subject || '').trim();
    if (subj && pc.slots && pc.slots.length >= 1) config.pinnedManual[subj] = pc.slots.slice();
  });
  if (STATE.config) {
    if (STATE.config.classlessNotes) config.classlessNotes = JSON.parse(JSON.stringify(STATE.config.classlessNotes));
    if (STATE.config.rawExtras) config.rawExtras = JSON.parse(JSON.stringify(STATE.config.rawExtras));
    if (STATE.config.classlessUnset) config.classlessUnset = STATE.config.classlessUnset.slice();
    if (STATE.config.regularSlots) config.regularSlots = JSON.parse(JSON.stringify(STATE.config.regularSlots));
  }
  return config;
}

function firstDuplicateSlot(blocks) {
  var seen = {};
  for (var i = 0; i < blocks.length; i++) {
    var idx = blocks[i].day * 8 + (blocks[i].period - 1);
    if (seen[idx]) return idx;
    seen[idx] = true;
  }
  return -1;
}

function saveSettings() {
  var config = assembleConfig();
  var dup = firstDuplicateSlot(config.fixedBlocks);
  if (dup !== -1) { alert('같은 슬롯에 규칙이 중복되었습니다: ' + slotLabel(dup) + '\n한 슬롯에는 하나의 규칙만 지정하세요.'); return; }
  var emptyGroups = DRAFT.groups.filter(function (g) { var n = (g.name || '').trim(); return n && g.subjects.length === 0; }).length;
  if (emptyGroups && !confirm('빈 그룹 ' + emptyGroups + '건은 저장에서 제외됩니다. 계속할까요?')) return;
  var emptyTeams = DRAFT.team.filter(function (t) { return (t.subject || '').trim() && t.teachers.length === 0; }).length;
  if (emptyTeams && !confirm('교사가 없는 팀티칭 ' + emptyTeams + '건은 저장에서 제외됩니다. 계속할까요?')) return;
  SETTINGS_DIRTY = false;
  postConfig(config, true); // 팝업은 닫지 않고 저장 결과만 반영
}

/* =========================================================
   유틸 & 바인딩
   ========================================================= */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

window.addEventListener('load', function () {
  document.getElementById('btnOpen').addEventListener('click', openSheet);
  document.getElementById('sheetInput').addEventListener('keydown', function (ev) {
    if (ev.key === 'Enter') openSheet();
  });
  document.getElementById('tabSelect').addEventListener('change', function (ev) {
    var v = ev.target.value;
    if (v && v !== STATE.tab) { clearUndoStack(); loadState(STATE.sheetId, v); }
  });
  document.getElementById('btnDuplicate').addEventListener('click', duplicateTab);
  document.getElementById('btnRefresh').addEventListener('click', function () { clearUndoStack(); loadState(STATE.sheetId, STATE.tab); });
  document.getElementById('btnUndo').addEventListener('click', doUndo);
  document.getElementById('btnSettings').addEventListener('click', openSettings);
  document.getElementById('btnCloseRaAssign').addEventListener('click', closeRaAssign);
  document.getElementById('raAssignBody').addEventListener('click', onRaAssignBodyClick);
  document.getElementById('btnUnavailMode').addEventListener('click', toggleUnavailMode);
  document.getElementById('btnRaRows').addEventListener('click', function () {
    var on = document.body.classList.toggle('show-ra');
    this.classList.toggle('active', on);
    this.setAttribute('aria-pressed', on ? 'true' : 'false');
    fitCells();
  });
  document.getElementById('btnConfirm').addEventListener('click', confirmPlan);
  document.getElementById('btnCancel').addEventListener('click', clearSelection);
  document.getElementById('panelToggle').addEventListener('click', togglePanelCollapse);
  document.querySelector('#panel h3').addEventListener('click', togglePanelCollapse);

  // 설정 패널: 이벤트 위임(구조 변경 시에만 재렌더 → 입력 포커스 유지)
  var body = document.getElementById('settingsBody');
  body.addEventListener('click', onSettingsClick);
  body.addEventListener('input', onSettingsInput);
  body.addEventListener('change', onSettingsChange);
  body.addEventListener('mousedown', gfPaintStart);
  body.addEventListener('mouseover', gfPaintOver);
  body.addEventListener('mouseout', gfPaintLeave);
  document.addEventListener('mouseup', gfPaintEnd);
  document.getElementById('btnCloseSettings').addEventListener('click', closeSettings);
  document.getElementById('btnSaveSettings').addEventListener('click', saveSettings);
  document.getElementById('settingsTabs').addEventListener('click', function (ev) {
    var t = ev.target.getAttribute('data-tab');
    if (t) switchSettingsTab(t);
  });
  document.getElementById('backdrop').addEventListener('click', function () {
    if (isRaAssignOpen()) { closeRaAssign(); return; }
    if (isSettingsOpen()) closeSettings();
  });

  document.addEventListener('keydown', function (ev) {
    // Ctrl+Z(⌘Z) → 되돌리기. 입력 요소 포커스 중에는 브라우저 기본 동작 유지.
    if ((ev.ctrlKey || ev.metaKey) && !ev.shiftKey && (ev.key === 'z' || ev.key === 'Z')) {
      var t = ev.target;
      var tag = t && t.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || (t && t.isContentEditable)) return;
      ev.preventDefault();
      if (STATE.undoStack.length) doUndo();
      return;
    }
    if (ev.key !== 'Escape') return;
    if (isRaAssignOpen()) { closeRaAssign(); return; }
    if (isSettingsOpen()) { closeSettings(); return; }
    clearSelection();
  });

  document.getElementById('btnLogout').addEventListener('click', doLogout);
  if (DEV_MODE) show('btnLogout', false);   // 개발 모드에는 로그인 개념이 없다

  if (DEV_MODE || getToken()) enterApp();
  else showLogin();
});
</script>
